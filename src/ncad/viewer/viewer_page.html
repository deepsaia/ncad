<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ncad 3D viewer</title>
<!-- Google Material Symbols (the icon set MUI ships), loaded as a font and referenced by
     name, so the hierarchy uses vetted icons instead of hand-drawn SVGs. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0" />
<script>
  // Apply the saved theme before first paint to avoid a flash of the wrong theme.
  (function () {
    var choice = localStorage.getItem("ncad.theme") || "system";
    var dark = choice === "dark" || (choice === "system" &&
      window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  })();
</script>
<style>
  /* ============================================================================
     ncad viewer styles
     Sections: Design tokens (theme) · Base · Sidebar · Spec + Models · Toast +
     swatches + toggles · Stage · Floating controls · Floating panels · Info
     Colors come from CSS variables (see tokens); [data-theme] swaps the palette.
     ============================================================================ */

  /* --- Design tokens (dark = default, light theme overrides below) --- */
  :root, :root[data-theme="dark"] {
    --bg: #0d1117; --bg-2: #11161f; --panel: #161d29; --panel-2: #1e2735;
    --text: #e8eef5; --muted: #8a97a8; --accent: #5aa0ff; --accent-2: #2bd4a8;
    --border: #283546; --shadow: 0 8px 30px rgba(0,0,0,.45);
    /* Themed tokens (dark): text on accent fills, translucent panels, hint, 3D scene. */
    --on-accent: #04101f; --panel-translucent: rgba(22,29,41,.82);
    --panel-strong: rgba(22,29,41,.92); --hint-bg: rgba(13,17,23,.72);
    --scene-bg: #0d1117; --grid-major: #33455c; --grid-minor: #1b2533; --edge: #0d1117;
    --accent-tint: rgba(90,160,255,.14);
    /* Log levels (dark): brighter tints for contrast on the dark panel. */
    --log-info: #b9c6d6; --log-success: #37d39a; --log-warn: #e6b34d; --log-error: #ff6b6b;
  }
  :root[data-theme="light"] {
    --bg: #eef1f5; --bg-2: #e4e9f0; --panel: #ffffff; --panel-2: #eef2f7;
    --text: #1a2230; --muted: #5c6675; --accent: #2f74d0; --accent-2: #12a67f;
    --border: #d0d8e2; --shadow: 0 8px 30px rgba(30,50,80,.14);
    --on-accent: #ffffff; --panel-translucent: rgba(255,255,255,.86);
    --panel-strong: rgba(255,255,255,.94); --hint-bg: rgba(238,241,245,.8);
    --scene-bg: #dfe5ec; --grid-major: #b9c4d2; --grid-minor: #cfd7e2; --edge: #6b7686;
    --accent-tint: rgba(47,116,208,.13);
    /* Log levels (light): darker tints for contrast on the white panel. */
    --log-info: #3a4658; --log-success: #0a8f63; --log-warn: #9a6b00; --log-error: #c0392b;
  }
  /* --- Base --- */
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    transition: background .2s ease, color .2s ease; }
  #app { display: flex; width: 100%; height: 100%; overflow: hidden; position: relative; }

  /* --- Sidebar --- */
  #sidebar { width: 286px; flex: none; background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 20px; gap: 22px; overflow-y: auto; }
  /* Draggable separator to resize the sidebar; width persists in localStorage. */
  #sidebar-resizer { flex: none; width: 3px; cursor: col-resize; background: transparent;
    border-right: 1px solid var(--border); transition: background .15s; }
  #sidebar-resizer:hover, #sidebar-resizer.dragging { background: #7cc4ff;
    box-shadow: 0 0 8px 1px rgba(124, 196, 255, .6); }
  body.resizing-sidebar { cursor: col-resize; user-select: none; }
  /* Top bar: brand + theme toggle, pinned to the top of the sidebar. */
  #topbar { position: sticky; top: -20px; z-index: 3; margin: -20px -20px 0; padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border-bottom: 1px solid var(--border); }
  #topbar .brand { flex: 1; }
  /* Single toggle that cycles light -> system -> dark, showing the current mode's icon. */
  .theme-toggle { display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 28px; color: var(--muted); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    transition: color .15s, border-color .15s; }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
  .theme-toggle span { display: inline-flex; }
  .brand { display: flex; align-items: baseline; gap: 2px; }
  .brand h1 { font-size: 18px; margin: 0; font-weight: 700; letter-spacing: 0.3px; }
  .brand .dot { color: var(--accent-2); font-size: 22px; line-height: 0; }
  .brand .sub { margin-left: auto; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); padding-top: 4px; }
  .label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 9px; font-weight: 600; }
  select, .btn { font: inherit; font-size: 13px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px;
    padding: 9px 11px; width: 100%; transition: border-color .15s, background .15s; }
  select:hover, .btn:hover { border-color: var(--accent); cursor: pointer; }
  .spec-row { display: flex; gap: 8px; align-items: stretch; }
  .combo { position: relative; flex: 1; }
  #spec-search { width: 100%; font: inherit; font-size: 13px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px;
    padding: 8px 32px 8px 10px; }
  #spec-search:focus { border-color: var(--accent); outline: none; }
  /* Clear (x) button: sits at the right of the search, red on hover. Hidden when empty. */
  .combo-clear { position: absolute; top: 50%; right: 5px; transform: translateY(-50%);
    display: inline-flex; align-items: center; justify-content: center; width: 22px;
    height: 22px; padding: 0; color: var(--muted); background: none; border: none;
    border-radius: 50%; cursor: pointer; transition: color .15s, background .15s; }
  .combo-clear:hover { color: #e74c3c; background: var(--panel); }
  .combo-clear[hidden] { display: none; }
  .spec-tree { position: absolute; z-index: 20; left: 0; right: 0; top: calc(100% + 4px);
    max-height: 40vh; overflow: auto; background: var(--panel); border: 1px solid var(--border);
    border-radius: 9px; padding: 6px; }
  .spec-tree .dir { font-size: 11px; color: var(--muted); padding: 6px 6px 2px;
    font-family: inherit; }
  .spec-tree .spec { padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .spec-tree .spec:hover, .spec-tree .spec.active { background: var(--panel-2); color: var(--accent); }
  .icon-btn { display: inline-flex; align-items: center; justify-content: center;
    width: 36px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text); cursor: pointer; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  /* --- Models list --- */
  /* Parts | Assemblies mode switch: two segmented buttons above the model list. */
  .view-mode-switch { display: flex; gap: 4px; margin: 4px 0 8px; }
  .mode-btn { flex: 1; padding: 4px 8px; font-size: 12px; cursor: pointer; color: var(--muted);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px; }
  .mode-btn.active { color: var(--on-accent); background: var(--accent); border-color: var(--accent); }
  .model-list { display: flex; flex-direction: column; gap: 4px; max-height: 30vh; overflow: auto; }
  .model-row { display: flex; align-items: center; gap: 6px; min-height: 40px;
    padding: 4px 9px; background: var(--panel-2); border: 1px solid transparent;
    border-radius: 8px; cursor: pointer; }
  .model-row:hover { border-color: var(--border); }
  .model-row.active { border-color: var(--accent); }
  .model-row .name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* The declared fps/steps suffix on a Motion row: small + muted, just right of the name. */
  .model-row .name .row-meta { margin-left: 8px; font-size: 9px; color: var(--muted);
    font-variant-numeric: tabular-nums; }
  /* Actions stay in layout at a fixed row height and only fade in on hover, so the row
     never resizes; toggling display caused a jittery height jump on hover. */
  .model-row .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s;
    pointer-events: none; }
  .model-row:hover .row-actions { opacity: 1; pointer-events: auto; }
  .row-actions .icon-btn { width: 26px; height: 26px; }
  .row-actions .act-regen:hover { border-color: #2ecc71; color: #2ecc71; }
  .row-actions .act-delete:hover { border-color: #e74c3c; color: #e74c3c; }
  #toast { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border); border-radius: 9px;
    padding: 10px 16px; font-size: 13px; color: var(--text); opacity: 0;
    transition: opacity .25s; pointer-events: none; z-index: 50; max-width: 70%; }
  #toast.show { opacity: 1; }
  #toast.error { border-color: var(--no, #d9534f); }
  /* --- Material swatches + scene toggles (shared) --- */
  .swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .swatch { aspect-ratio: 1; border-radius: 6px; border: 1.5px solid var(--border);
    cursor: pointer; transition: transform .12s, border-color .12s; }
  .swatch:hover { transform: translateY(-2px); }
  .swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--accent); }

  .toggle-row { display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; color: var(--text); padding: 5px 0; }
  .switch { position: relative; width: 40px; height: 22px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 22px; transition: .2s; }
  .slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 2px;
    top: 2px; background: var(--muted); border-radius: 50%; transition: .2s; }
  input:checked + .slider { background: var(--accent); border-color: var(--accent); }
  input:checked + .slider:before { transform: translateX(18px); background: var(--on-accent); }
  .spacer { margin-top: auto; }

  /* --- Stage (3D viewport) --- */
  #stage { flex: 1 1 0; min-width: 0; position: relative; overflow: hidden; }
  /* The canvas always fills the stage via CSS, so during the sidebar slide it scales
     smoothly; the backing resolution is refit once when the transition ends (no
     per-frame setSize, which would recreate the drawing buffer and look like a reload). */
  #stage canvas { display: block; width: 100% !important; height: 100% !important; }
  canvas { display: block; }
  #spinner { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--muted); font-size: 14px; pointer-events: none; }
  #hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: var(--muted); background: var(--hint-bg);
    padding: 7px 16px; border-radius: 22px; border: 1px solid var(--border);
    backdrop-filter: blur(6px); }

  /* Motion timeline (bucket 6.0): a bottom-center play/pause + scrubber + driver readout. */
  #motion-bar { position: absolute; bottom: 54px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px; z-index: 55;
    background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 10px; backdrop-filter: blur(6px); }
  #motion-bar[hidden] { display: none; }
  /* Transport: -, play/pause, + as one compact segmented pill. */
  #motion-transport { display: flex; align-items: center; border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; background: var(--panel-2); }
  #motion-transport > button { display: flex; align-items: center; justify-content: center;
    height: 26px; border: 0; background: transparent; color: var(--text); cursor: pointer; }
  #motion-transport > button:hover:not(:disabled) { background: var(--accent); color: #fff; }
  #motion-transport > button:disabled { opacity: 0.35; cursor: default; }
  #motion-play { width: 30px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  .motion-step { width: 26px; color: var(--muted); }
  #motion-speed-readout { font-size: 12px; color: var(--text); font-weight: 600; min-width: 38px;
    text-align: center; font-variant-numeric: tabular-nums; cursor: default; }
  #motion-scrub-wrap { position: relative; width: 200px; height: 18px; display: flex;
    align-items: center; }
  #motion-scrub { width: 100%; accent-color: var(--accent); cursor: pointer; }
  /* Motion-time interference (6.3): red ticks on the scrubber at interfering frame indices. */
  #motion-clash-marks { position: absolute; left: 0; right: 0; bottom: 0; height: 4px;
    pointer-events: none; }
  #motion-clash-marks .clash-tick { position: absolute; width: 2px; height: 4px;
    background: #e74c3c; transform: translateX(-1px); }
  #motion-readout { font-size: 12px; color: var(--muted); min-width: 50px;
    text-align: right; font-variant-numeric: tabular-nums; }

  /* Floating viewport controls (translucent, movable/snapping, icon-first) */
  #viewport-controls { position: absolute; z-index: 40; display: flex;
    flex-direction: column; gap: 4px; padding: 5px; width: max-content;
    background: var(--panel-translucent); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow); backdrop-filter: blur(10px); }
  .vc-head { display: flex; align-items: center; gap: 6px; position: relative; }
  .vc-grip { display: inline-flex; align-items: center; justify-content: center;
    color: var(--muted); background: none; border: none; cursor: grab; padding: 2px; }
  .vc-grip:active { cursor: grabbing; }
  .vc-head-actions { display: flex; gap: 4px; margin-left: auto; }
  .vc-cfg { display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; color: var(--muted); background: none;
    border: 1px solid transparent; border-radius: 7px; cursor: pointer; }
  .vc-cfg:hover, .vc-cfg.active { color: var(--accent); border-color: var(--border); }
  .vc-corner-pop { position: absolute; top: calc(100% + 6px); right: 0; z-index: 5;
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 7px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 9px; }
  .vc-corner-pop[hidden] { display: none; }
  .vc-corner-pop button { width: 26px; height: 20px; border-radius: 5px;
    background: var(--panel-2); border: 1px solid var(--border); cursor: pointer;
    position: relative; }
  .vc-corner-pop button:hover { border-color: var(--accent); }
  .vc-corner-pop button::after { content: ""; position: absolute; width: 8px; height: 6px;
    border-radius: 2px; background: var(--accent); }
  .vc-corner-pop button[data-corner="top-left"]::after { top: 3px; left: 3px; }
  .vc-corner-pop button[data-corner="top-right"]::after { top: 3px; right: 3px; }
  .vc-corner-pop button[data-corner="bottom-left"]::after { bottom: 3px; left: 3px; }
  .vc-corner-pop button[data-corner="bottom-right"]::after { bottom: 3px; right: 3px; }
  .vc-group { display: flex; gap: 3px; }
  .vc-group[hidden] { display: none; }  /* `hidden` must beat the .vc-group display rule */
  .vc-sep { height: 1px; background: var(--border); margin: 1px 2px; }
  .vc-sep[hidden] { display: none; }
  .vc-btn { display: inline-flex; align-items: center; gap: 6px; justify-content: center;
    min-width: 30px; height: 30px; padding: 0 6px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px;
    cursor: pointer; transition: color .15s, border-color .15s, background .15s; }
  /* Label collapses to zero width (not display:none) so show/hide animates smoothly;
     the icon stays anchored and the button grows/shrinks without a jump. */
  .vc-btn .vc-label { font-size: 12px; white-space: nowrap; overflow: hidden;
    max-width: 0; opacity: 0; margin-left: -6px;
    transition: max-width .2s ease, opacity .2s ease, margin-left .2s ease; }
  .vc-btn:hover { border-color: var(--accent); color: var(--accent); }
  .vc-btn.active { color: var(--accent); border-color: var(--accent);
    background: var(--accent-tint); }
  /* Distinct hover glow colors for scene toggles + reset */
  #vc-light:hover { color: #ffd166; border-color: #ffd166; }
  .vc-toggle[data-toggle="rotate"]:hover { color: #7cc4ff; border-color: #7cc4ff; }
  #vc-reset:hover { color: #ff8f6b; border-color: #ff8f6b; }
  /* Lighting: cycle button + caret dropdown of icon options */
  .vc-light-wrap { position: relative; display: flex; }
  .vc-light-wrap #vc-light { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .vc-caret { display: inline-flex; align-items: center; justify-content: center; width: 16px;
    height: 30px; color: var(--muted); background: var(--panel-2);
    border: 1px solid var(--border); border-left: none; border-radius: 0 8px 8px 0; cursor: pointer; }
  .vc-caret:hover { color: #ffd166; border-color: #ffd166; }
  .vc-menu { position: absolute; top: calc(100% + 5px); left: 0; z-index: 6; min-width: 128px;
    display: flex; flex-direction: column; gap: 1px; padding: 4px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: var(--shadow); }
  .vc-menu[hidden] { display: none; }
  .vc-menu button { display: flex; align-items: center; gap: 8px; padding: 5px 8px;
    font-size: 12.5px; color: var(--text); background: none; border: 1px solid transparent;
    border-radius: 6px; cursor: pointer; text-align: left; }
  .vc-menu .vc-mi svg { width: 15px; height: 15px; }
  .vc-menu button:hover, .vc-menu button.active { background: var(--panel-2); color: #ffd166;
    border-color: var(--border); }
  .vc-mi { display: inline-flex; color: currentColor; }
  #vc-light-icon { display: inline-flex; }
  .vc-sub { display: flex; flex-direction: column; gap: 5px; padding: 2px; }
  .vc-sub[hidden] { display: none; }
  .vc-sub-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); }
  #vc-material .swatches { grid-template-columns: repeat(8, 14px); }
  #vc-material .swatch { width: 14px; }
  /* By-material color panel: one row per distinct material, a color dot + name + hidden
     native color input (clicking the row opens the picker). */
  #material-colors { display: flex; flex-direction: column; gap: 5px; }
  .matrow { display: flex; align-items: center; gap: 8px; font-size: 12px; cursor: pointer;
    position: relative; }
  .matrow .dot { width: 14px; height: 14px; border-radius: 50%; flex: none;
    border: 1.5px solid var(--border); }
  .matrow .mname { color: var(--text); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; }
  .matrow input[type=color] { position: absolute; left: 0; width: 16px; height: 16px;
    opacity: 0; cursor: pointer; }
  #vc-modes .vc-btn[hidden] { display: none; }
  /* Show-text mode: reveal labels, stack groups vertically for readability */
  #viewport-controls.show-text .vc-label { max-width: 140px; opacity: 1; margin-left: 0; }
  #viewport-controls.show-text .vc-group { flex-direction: column; }
  #viewport-controls.show-text .vc-btn { justify-content: flex-start; }
  /* Only the corner-anchor button animates position (adds .vc-animate briefly). Manual
     drag and edge-snap stay instant/1:1 because they never carry this class. */
  #viewport-controls.vc-animate { transition: left .28s ease, right .28s ease,
    top .28s ease, bottom .28s ease; }

  /* --- Right sidebar (BOM / Hierarchy), collapsible with a drag separator ---
     Width is a CSS variable so collapse can animate it to zero smoothly (display:none
     cannot transition). The rail animates its own width in the opposite direction. */
  :root { --rs-width: 320px; }
  #right-resizer { flex: none; width: 3px; cursor: col-resize; background: transparent;
    border-left: 1px solid var(--border); transition: background .15s; }
  #right-resizer:hover, #right-resizer.dragging { background: #7cc4ff;
    box-shadow: 0 0 8px 1px rgba(124, 196, 255, .6); }
  #right-sidebar { flex: none; width: var(--rs-width); overflow: hidden;
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border-left: 1px solid var(--border); display: flex; flex-direction: column;
    min-width: 0; transition: width .25s ease; }
  #right-sidebar .tabs { display: flex; border-bottom: 1px solid var(--border); flex: none;
    padding-right: 34px; }
  #right-sidebar .tab { flex: 1; font: inherit; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .6px; color: var(--muted); background: none;
    border: none; border-bottom: 2px solid transparent; padding: 11px 4px; cursor: pointer; }
  #right-sidebar .tab:hover { color: var(--text); }
  #right-sidebar .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  #right-sidebar .tab-head { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    flex: none; border-bottom: 1px solid var(--border); }
  #right-sidebar .tab-head .grow { flex: 1; }
  .rs-icon-btn { width: 26px; height: 24px; display: inline-flex; align-items: center;
    justify-content: center; color: var(--muted); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 7px; cursor: pointer; }
  .rs-icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .rs-icon-btn.active { color: var(--accent); border-color: var(--accent); }
  /* A class-level display would otherwise override the HTML `hidden` attribute. */
  .rs-icon-btn[hidden] { display: none; }
  .tab-panel { display: none; flex: 1; overflow: auto; padding: 12px 14px; }
  .tab-panel.active { display: block; }
  /* Session log (Logs tab): monospace lines, newest at the bottom; not persisted across reloads. */
  #logs-body { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11.5px; }
  .log-line { padding: 2px 0; border-bottom: 1px solid var(--border); white-space: pre-wrap;
    word-break: break-word; color: var(--log-info); }
  .log-line .log-time { color: var(--muted); margin-right: 6px; }
  /* Log level colors, themed for readability on both light and dark backgrounds. */
  .log-line.log-success { color: var(--log-success); }
  .log-line.log-warn { color: var(--log-warn); }
  .log-line.log-error { color: var(--log-error); }
  .bom-row { display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; padding: 7px 0; border-top: 1px solid var(--border); }
  .bom-row:first-child { border-top: none; }
  .bom-row .k { color: var(--muted); }
  .bom-row .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .bom-row .u { color: var(--muted); font-weight: 400; font-size: 11px; margin-left: 3px; }
  .panel-empty { font-size: 12px; color: var(--muted); padding: 8px 0; }
  /* Sketch constraint status is shown inline on the sketch's own tree row (a colored dot). */
  .status-dot { width: 9px; height: 9px; border-radius: 50%; flex: none;
    background: var(--muted); }
  .status-dot.well { background: #2ecc71; }
  .status-dot.under { background: #f2c14e; }
  .status-dot.over, .status-dot.inconsistent { background: #e74c3c; }

  /* Collapsed rail: a narrow bar with a reopen icon at the top. Its width animates
     from 0 so open/close slides smoothly alongside the sidebar. */
  #right-rail { flex: none; width: 0; overflow: hidden; background: var(--panel);
    border-left: 1px solid var(--border); display: flex; flex-direction: column;
    align-items: center; padding-top: 8px; transition: width .25s ease; }
  body.right-collapsed #right-sidebar { width: 0; border-left: none; }
  body.right-collapsed #right-resizer { display: none; }
  body.right-collapsed #right-rail { width: 30px; }
  #right-rail .rail-label { writing-mode: vertical-rl; margin-top: 38px; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; color: var(--muted); user-select: none; }
  /* One fixed toggle, always at the same top-right spot (the rail's rest position). */
  #right-toggle { position: absolute; top: 8px; right: 3px; z-index: 6; background: var(--panel); }
  #right-toggle svg { transition: transform .25s ease; }
  #right-toggle.collapsed svg { transform: scaleX(-1); }

  /* --- Blender-style hierarchy tree --- */
  .tree-row { display: flex; align-items: center; gap: 5px; font-size: 12.5px;
    padding: 2px 0; white-space: nowrap; color: var(--text); }
  .tree-row-active { background: var(--panel-2); border-radius: 4px; }
  .tree-twist { width: 12px; flex: none; color: var(--muted); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; font-size: 9px; }
  .tree-twist.leaf { visibility: hidden; }
  /* Material Symbols glyph, sized to the tree row. font-variation-settings tunes the
     optical size/weight so the glyph reads crisply at 18px. */
  .material-symbols-rounded { font-family: "Material Symbols Rounded";
    font-weight: normal; font-style: normal; line-height: 1;
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
    -webkit-font-feature-settings: "liga"; }
  .tree-ico { width: 15px; height: 15px; flex: none; color: var(--muted); font-size: 15px;
    display: inline-flex; align-items: center; justify-content: center; overflow: hidden; }
  .tree-ico.part { color: var(--accent-2); }
  .tree-ico.feature { color: var(--accent); }
  .tree-ico.group { color: var(--muted); }
  .tree-ico.body { color: var(--accent-2); }
  .tree-name { overflow: hidden; text-overflow: ellipsis; }
  .tree-op { color: var(--muted); font-size: 11px; margin-left: 4px; }
  .tree-ico.sketch { color: var(--accent); }
  /* inline sketch-status dot sits just after the op label */
  .tree-status { margin-left: 5px; }
  /* the dof readout is muted and only reveals on row hover, so the tree stays clean */
  .tree-dof { color: var(--muted); font-size: 10px; margin-left: 5px; opacity: 0;
    transition: opacity .12s; font-variant-numeric: tabular-nums; }
  .tree-row:hover .tree-dof { opacity: 1; }
  #tab-hierarchy.hide-text .tree-dof { display: none; }
  /* material chip: pushed to the row's end, muted pill */
  .tree-mat { margin-left: auto; padding: 0 6px; border-radius: 8px; font-size: 10px;
    color: var(--muted); background: var(--panel-2); border: 1px solid var(--border);
    white-space: nowrap; }
  .tree-children { margin-left: 12px; border-left: 1px solid var(--border);
    padding-left: 4px; }
  .tree-collapsed > .tree-children { display: none; }
  #tab-hierarchy.hide-text .tree-name, #tab-hierarchy.hide-text .tree-op,
  #tab-hierarchy.hide-text .tree-mat { display: none; }

  /* --- Assembly mate status + chips (bucket 5.2) --- */
  .mate-status { font-size: 11.5px; padding: 3px 6px; margin-bottom: 5px; border-radius: 5px;
    background: var(--panel-2); border: 1px solid var(--border); }
  .mate-status.mate-status-ok { color: var(--log-success); }
  .mate-status.mate-status-warn { color: var(--log-warn); }
  .mate-status.mate-status-bad { color: var(--log-error); }
  /* Measures panel (motion outputs, bucket 6.1) + mobility line. */
  .measure-row { display: flex; align-items: baseline; gap: 8px; padding: 4px 6px;
    border-bottom: 1px solid var(--border); font-size: 12px; }
  .measure-id { font-weight: 600; color: var(--text); min-width: 70px; }
  .measure-val { color: var(--accent); font-variant-numeric: tabular-nums; min-width: 70px; }
  .measure-range { color: var(--muted); font-size: 11px; }
  .tree-badge { margin-left: 6px; padding: 0 6px; border-radius: 8px; font-size: 10px;
    color: var(--muted); background: var(--panel-2); border: 1px solid var(--border);
    white-space: nowrap; }
  .tree-badge-bad { color: var(--log-error); border-color: var(--log-error); }
  .mate-chip { margin: 2px 0 2px 22px; padding: 1px 7px; border-radius: 8px; font-size: 10.5px;
    color: var(--muted); background: var(--panel-2); border: 1px solid var(--border);
    display: inline-block; }
  .mate-chip.mate-chip-bad { color: var(--log-error); border-color: var(--log-error); }
  .mate-chip.mate-chip-redundant { color: var(--log-warn); border-color: var(--log-warn); }
  /* Joint chips (bucket 5.4a): the mechanism family, an accent border to read distinct from mates. */
  .joint-chip { margin: 2px 0 2px 22px; padding: 1px 7px; border-radius: 8px; font-size: 10.5px;
    color: var(--accent); background: var(--panel-2); border: 1px solid var(--accent);
    display: inline-block; }
  .joint-chip.mate-chip-bad { color: var(--log-error); border-color: var(--log-error); }
  .joint-chip.mate-chip-redundant { color: var(--log-warn); border-color: var(--log-warn); }
  /* Coupling chips (bucket 5.4b): declared joint-to-joint, dashed + muted (enforced in Phase 6). */
  .coupling-chip { margin: 2px 0 2px 22px; padding: 1px 7px; border-radius: 8px; font-size: 10.5px;
    color: var(--muted); background: transparent; border: 1px dashed var(--muted);
    display: inline-block; }

  /* --- Orientation ViewCube (top-right of the viewport), 128px. Interactive: click a face/edge/
     corner to snap the camera to that view, so it must receive pointer events. --- */
  #gizmo { position: absolute; top: 10px; right: 10px; width: 128px; height: 128px;
    pointer-events: auto; z-index: 5; }

  /* --- Info readout (sidebar footer) --- */
  #info { font-size: 12px; color: var(--muted); line-height: 1.8;
    border-top: 1px solid var(--border); padding-top: 14px; }
  #info b { color: var(--text); font-weight: 600; }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="topbar">
      <div class="brand"><h1>ncad<span class="dot">.</span></h1><span class="sub">viewer</span></div>
      <button id="theme-toggle" class="theme-toggle" title="Theme" aria-label="Toggle color theme">
        <span id="theme-icon"></span>
      </button>
    </div>
    <div id="view-mode-switch" class="view-mode-switch">
      <button id="mode-parts" class="mode-btn active" data-mode="parts">Part</button>
      <button id="mode-assemblies" class="mode-btn" data-mode="assemblies">Asm</button>
      <button id="mode-motion" class="mode-btn" data-mode="motion">Motion</button>
    </div>
    <div>
      <div class="label">Spec</div>
      <div class="spec-row">
        <div class="combo">
          <input id="spec-search" type="text" placeholder="search examples..." autocomplete="off" />
          <button id="spec-clear" class="combo-clear" title="Clear" aria-label="Clear search" hidden>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
          <div id="spec-tree" class="spec-tree" hidden></div>
        </div>
        <button id="spec-build" class="icon-btn" title="Build" aria-label="Build">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5 20.5 7v10L12 21.5 3.5 17V7L12 2.5Z"/><path d="M3.5 7 12 11.5 20.5 7"/><path d="M12 11.5V21.5"/></svg>
        </button>
      </div>
    </div>
    <div>
      <div class="label">Models</div>
      <div id="model-list" class="model-list"></div>
    </div>
    <div class="spacer"></div>
    <div id="info">
      <div><b>Size</b> <span id="i-size">-</span></div>
      <div><b>Triangles</b> <span id="i-tris">-</span></div>
      <div><b>Meshes</b> <span id="i-meshes">-</span></div>
      <div><b>Picked</b> <span id="i-picked">-</span></div>
    </div>
  </aside>

  <div id="sidebar-resizer" title="Drag to resize" aria-label="Resize sidebar" role="separator"></div>

  <main id="stage">
    <div id="spinner">loading…</div>

    <div id="viewport-controls" class="vc" data-corner="top-left">
      <div class="vc-head">
        <button class="vc-grip" title="Drag to move" aria-label="Drag to move">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg>
        </button>
        <div class="vc-head-actions">
          <button id="vc-corner" class="vc-cfg" title="Anchor to a corner" aria-label="Anchor to a corner">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
          </button>
          <button id="vc-text" class="vc-cfg" title="Show labels" aria-label="Show labels">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V5h16v2M9 5v14M7 19h4"/></svg>
          </button>
        </div>
        <div id="vc-corner-pop" class="vc-corner-pop" hidden>
          <button data-corner="top-left" title="Top left" aria-label="Top left"></button>
          <button data-corner="top-right" title="Top right" aria-label="Top right"></button>
          <button data-corner="bottom-left" title="Bottom left" aria-label="Bottom left"></button>
          <button data-corner="bottom-right" title="Bottom right" aria-label="Bottom right"></button>
        </div>
      </div>

      <div class="vc-group" id="vc-modes" aria-label="Display mode">
        <button class="vc-btn active" data-mode="solid" title="Solid">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3 20 7.5v9L12 21 4 16.5v-9L12 3Z" fill="currentColor" fill-opacity=".18"/><path d="M4 7.5 12 12l8-4.5M12 12v9"/></svg>
          <span class="vc-label">Solid</span>
        </button>
        <button class="vc-btn" data-mode="material" title="Material">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8"/><circle cx="9.5" cy="9.5" r="2.4" fill="currentColor" stroke="none"/></svg>
          <span class="vc-label">Material</span>
        </button>
        <button class="vc-btn" data-mode="wireframe" title="Wireframe">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M12 3 20 7.5v9L12 21 4 16.5v-9L12 3Z"/><path d="M4 7.5 12 12l8-4.5M12 12v9"/></svg>
          <span class="vc-label">Wireframe</span>
        </button>
        <button class="vc-btn" data-mode="xray" title="X-ray">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/></svg>
          <span class="vc-label">X-ray</span>
        </button>
        <button class="vc-btn" data-mode="bymaterial" title="By material" hidden>
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3 20 7.5v9L12 21 4 16.5v-9L12 3Z"/><circle cx="8.5" cy="10" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="13" r="1.5" fill="currentColor" stroke="none"/></svg>
          <span class="vc-label">By material</span>
        </button>
      </div>

      <div class="vc-sub" id="vc-material" hidden>
        <span class="vc-sub-label">Material</span>
        <div class="swatches" id="swatches"></div>
      </div>

      <div class="vc-sub" id="vc-bymaterial" hidden>
        <span class="vc-sub-label">Materials</span>
        <div id="material-colors"></div>
      </div>

      <div class="vc-sep"></div>

      <div class="vc-group" id="vc-scene">
        <div class="vc-light-wrap">
          <button id="vc-light" class="vc-btn" title="Lighting: Sun (click to cycle)">
            <span id="vc-light-icon"></span>
            <span class="vc-label" id="vc-light-label">Sun</span>
          </button>
          <button id="vc-light-caret" class="vc-caret" title="Choose lighting" aria-label="Choose lighting">
            <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div id="vc-light-menu" class="vc-menu" hidden>
            <button data-light="sun" title="Sun (directional)"><span class="vc-mi"></span><span>Sun</span></button>
            <button data-light="natural" title="Natural (all-around)"><span class="vc-mi"></span><span>Natural</span></button>
            <button data-light="studio" title="Studio (3-point)"><span class="vc-mi"></span><span>Studio</span></button>
            <button data-light="spotlight" title="Spotlight"><span class="vc-mi"></span><span>Spotlight</span></button>
            <button data-light="overcast" title="Overcast (soft)"><span class="vc-mi"></span><span>Overcast</span></button>
          </div>
        </div>
        <button class="vc-btn vc-toggle active" data-toggle="edges" title="Edges">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3 20 7.5v9L12 21 4 16.5v-9L12 3Z"/></svg>
          <span class="vc-label">Edges</span>
        </button>
        <button class="vc-btn vc-toggle active" data-toggle="grid" title="Grid">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h16v16H4zM4 9.3h16M4 14.6h16M9.3 4v16M14.6 4v16"/></svg>
          <span class="vc-label">Grid</span>
        </button>
        <button class="vc-btn vc-toggle active" data-toggle="shadow" title="Shadows">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="10" cy="9" r="5"/><ellipse cx="13" cy="18.5" rx="7" ry="2" fill="currentColor" stroke="none" opacity=".5"/></svg>
          <span class="vc-label">Shadows</span>
        </button>
        <button class="vc-btn vc-toggle" data-toggle="rotate" title="Auto-rotate">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
          <span class="vc-label">Auto-rotate</span>
        </button>
        <button class="vc-btn vc-toggle" data-toggle="freelook"
                title="Free-look: off = revolve around vertical axis, on = full free-form tumble">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="9" ry="3.6"/><ellipse cx="12" cy="12" rx="3.6" ry="9"/></svg>
          <span class="vc-label">Free-look</span>
        </button>
        <button id="vc-reset" class="vc-btn" title="Reset view">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l4-4 4 4M7 5v9a4 4 0 0 0 4 4h6"/></svg>
          <span class="vc-label">Reset view</span>
        </button>
      </div>

      <div class="vc-sep" id="vc-asm-sep" hidden></div>

      <!-- Assembly-only controls: shown in Assemblies mode. -->
      <div class="vc-group" id="vc-assembly" hidden aria-label="Assembly">
        <button class="vc-btn vc-toggle" data-toggle="origins" title="Instance origins (pickup-point axes)">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V6M12 6l-3 3M12 6l3 3M12 21H4M4 21l3-3M4 21l3 3M12 21h5l3-4"/></svg>
          <span class="vc-label">Origins</span>
        </button>
        <button class="vc-btn vc-toggle" data-toggle="connectors" title="Mate connector frames">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
          <span class="vc-label">Connectors</span>
        </button>
        <button class="vc-btn vc-toggle" data-toggle="isolate" title="Isolate selected instance">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2.5"/></svg>
          <span class="vc-label">Isolate</span>
        </button>
        <button class="vc-btn vc-toggle" data-toggle="joints" title="Joint freedom glyphs">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12a7 7 0 0 1 14 0"/><path d="M12 5v4"/><circle cx="12" cy="12" r="1.5"/></svg>
          <span class="vc-label">Joints</span>
        </button>
        <button class="vc-btn vc-toggle active" data-toggle="traces" title="Motion trace curves">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18c4-1 5-12 8-12s4 11 8 12"/></svg>
          <span class="vc-label">Traces</span>
        </button>
      </div>

      <div class="vc-sep"></div>

      <div class="vc-group" id="vc-panels">
        <button class="vc-btn vc-toggle" id="vc-sidebar-toggle" title="Data sidebar (BOM / Hierarchy)">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg>
          <span class="vc-label">Sidebar</span>
        </button>
      </div>
    </div>

    <div id="gizmo"></div>
    <div id="hint">drag to orbit · scroll to zoom · right-drag to pan</div>
    <div id="toast"></div>

    <!-- Motion timeline (bucket 6.0): shown only when the loaded assembly has a motion sidecar. -->
    <div id="motion-bar" hidden>
      <div id="motion-transport">
        <button id="motion-slower" class="motion-step" title="Slower ( [ )" aria-label="Slower">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M5 11h14v2H5z"/></svg>
        </button>
        <button id="motion-play" title="Play / pause motion">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="motion-faster" class="motion-step" title="Faster ( ] )" aria-label="Faster">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/></svg>
        </button>
        <button id="motion-loop" class="motion-step" title="Loop mode: loop / bounce ( L )"
          aria-label="Loop mode"></button>
      </div>
      <span id="motion-speed-readout" title="Playback speed (replay only; does not re-solve)">1x</span>
      <div id="motion-scrub-wrap">
        <input id="motion-scrub" type="range" min="0" max="0" value="0" step="1" aria-label="Motion frame">
        <div id="motion-clash-marks" aria-hidden="true"></div>
      </div>
      <span id="motion-readout">0&deg;</span>
    </div>
  </main>

  <div id="right-resizer" title="Drag to resize" aria-label="Resize data sidebar" role="separator"></div>

  <aside id="right-sidebar">
    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="hierarchy" role="tab">Hierarchy</button>
      <button class="tab" data-tab="bom" role="tab">BOM</button>
      <button class="tab" id="tab-measures-btn" data-tab="measures" role="tab" hidden>Measures</button>
      <button class="tab" data-tab="logs" role="tab">Logs</button>
    </div>
    <div class="tab-head">
      <span class="grow"></span>
      <button id="tree-text-toggle" class="rs-icon-btn active" title="Toggle labels" hidden>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V5h16v2M9 5v14M7 19h4"/></svg>
      </button>
    </div>
    <div class="tab-panel active" id="tab-hierarchy" role="tabpanel">
      <div id="hierarchy-body"><div class="panel-empty">select a model</div></div>
    </div>
    <div class="tab-panel" id="tab-bom" role="tabpanel">
      <div id="bom-body"><div class="panel-empty">select a model</div></div>
    </div>
    <div class="tab-panel" id="tab-measures" role="tabpanel">
      <div id="measures-body"><div class="panel-empty">no measures</div></div>
    </div>
    <div class="tab-panel" id="tab-logs" role="tabpanel">
      <div id="logs-body"><div class="panel-empty">no log entries yet</div></div>
    </div>
  </aside>

  <div id="right-rail"><span class="rail-label">Data</span></div>

  <!-- Single collapse/expand control, pinned to a fixed spot (top-right) so it never
       moves between the open and collapsed states. The chevron flips direction. -->
  <button id="right-toggle" class="rs-icon-btn" title="Toggle data sidebar" aria-label="Toggle data sidebar">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
  </button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { TrackballControls } from "three/addons/controls/TrackballControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const stage = document.getElementById("stage");
const spinner = document.getElementById("spinner");

// API base + model-bytes base, so ONE SPA serves both servers. The Tornado service (ncad serve)
// injects window.NCAD_API_BASE = "/api/v1"; the stdlib viewer (ncad view) injects nothing and uses
// its historical prefixes (JSON under /api, model bytes at /models). Call apiUrl/modelUrl with the
// path AFTER the prefix (e.g. apiUrl("/specs"), modelUrl(name)):
//   ncad serve:  /api/v1/specs, /api/v1/models/<name>
//   ncad view:   /api/specs,    /models/<name>
const API = (typeof window !== "undefined" && window.NCAD_API_BASE) || "/api";
const MODEL_BASE = (typeof window !== "undefined" && window.NCAD_API_BASE)
  ? window.NCAD_API_BASE + "/models" : "/models";
function apiUrl(path) { return API + path; }              // path AFTER /api, e.g. "/specs"
function modelUrl(name) { return MODEL_BASE + "/" + name; }  // model bytes

// Browser live-reload (dev only, ncad serve): open /ws/livereload and reload when the server's
// boot id changes. Reconnect-and-compare, not server push: we record the first boot id we see;
// when autoreload re-execs the server the socket drops, we reconnect with backoff, and the fresh
// process reports a different boot id, which triggers a reload. Guarded by window.NCAD_DEV so the
// stdlib viewer (no ws route) never attempts it and production stays quiet.
function startLiveReload() {
  if (typeof window === "undefined" || !window.NCAD_DEV) return;
  const url = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws/livereload";
  let firstBootId = null, backoff = 250;
  const connect = () => {
    let ws;
    try { ws = new WebSocket(url); } catch (e) { setTimeout(connect, backoff); return; }
    ws.onmessage = ev => {
      let msg; try { msg = JSON.parse(ev.data); } catch (e) { return; }
      if (msg.type !== "hello") return;
      if (firstBootId === null) { firstBootId = msg.boot_id; backoff = 250; }
      else if (msg.boot_id !== firstBootId) { location.reload(); }
    };
    // On drop (server re-exec), reconnect with capped exponential backoff; the successful
    // reconnect to the fresh process delivers the new boot id and reloads.
    ws.onclose = () => { setTimeout(connect, backoff); backoff = Math.min(backoff * 2, 2000); };
    ws.onerror = () => { try { ws.close(); } catch (e) { /* onclose handles retry */ } };
  };
  connect();
}
startLiveReload();

// Read a resolved CSS variable (so the 3D scene shares the same palette as the DOM).
function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function cssColor(name) { return new THREE.Color(cssVar(name)); }

const scene = new THREE.Scene();
scene.background = cssColor("--scene-bg");
scene.fog = new THREE.Fog(cssColor("--scene-bg"), 40, 120);

const camera = new THREE.PerspectiveCamera(45, stage.clientWidth / stage.clientHeight, 0.01, 1000);
// Z-up world: models are authored Z-up and the loaded glTF is rotated into a
// Z-up scene (see loadModel), so scene coordinates equal modeled coordinates.
camera.up.set(0, 0, 1);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(stage.clientWidth, stage.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

// Orientation mode: "axis" keeps up-vector fixed and revolves around the vertical
// axis (OrbitControls, good for grounded parts); "free" allows full trackball tumble
// so the model can be overturned completely (TrackballControls). `controls` is
// swapped between the two, preserving the camera position and orbit target.
let controls = null;
let orientationMode = "axis";
let autoRotate = false;

function makeControls(mode) {
  if (mode === "free") {
    const c = new TrackballControls(camera, renderer.domElement);
    c.rotateSpeed = 3.0;
    c.panSpeed = 0.8;
    c.dynamicDampingFactor = 0.15;
    return c;
  }
  const c = new OrbitControls(camera, renderer.domElement);
  c.enableDamping = true;
  c.dampingFactor = 0.08;
  return c;
}

function setOrientationMode(mode) {
  const target = controls ? controls.target.clone() : new THREE.Vector3(0, 0, 0);
  if (controls) controls.dispose();
  orientationMode = mode;
  // TrackballControls tilts camera.up while tumbling; axis mode must restore world-up
  // (Z-up) so OrbitControls revolves around the vertical, still able to look up at the
  // underside. Without this the locked-in view stays tilted after a free-look session.
  if (mode === "axis") camera.up.set(0, 0, 1);
  controls = makeControls(mode);
  controls.target.copy(target);
  // OrbitControls honors autoRotate; TrackballControls has no such option.
  if (mode === "axis") controls.autoRotate = autoRotate;
  controls.update();
}

setOrientationMode("axis");

// --- Orientation ViewCube (Creo/NX/Fusion/Blender style), labeled in CAD Z-up ---
// An interactive cube in its own overlay canvas: 26 pickable cells (6 faces + 12 edges + 8
// corners) laid out as a 3x3x3 grid minus the center. Each cell carries a world-space direction;
// clicking it tweens the main camera to look FROM that direction (a face -> orthographic view,
// an edge -> edge-on, a corner -> isometric). Faces are labeled in the Z-up CAD convention:
// +Z TOP, -Z BOTTOM, +X RIGHT, -X LEFT, -Y FRONT, +Y BACK. The cube is axis-aligned and static;
// the gizmo camera mirrors the main view so the cube tumbles exactly with the model.
const gizmoDiv = document.getElementById("gizmo");
const gizmoRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
gizmoRenderer.setPixelRatio(window.devicePixelRatio);
gizmoRenderer.setSize(128, 128);
gizmoRenderer.setClearColor(0x000000, 0);
gizmoDiv.appendChild(gizmoRenderer.domElement);
const cubeScene = new THREE.Scene();
const cubeCam = new THREE.OrthographicCamera(-1.7, 1.7, 1.7, -1.7, 0.1, 20);
cubeScene.add(new THREE.HemisphereLight(0xffffff, 0x888c94, 1.1));
const cubeKey = new THREE.DirectionalLight(0xffffff, 0.55); cubeKey.position.set(3, 5, 8);
cubeScene.add(cubeKey);

// Face labels by outward direction, and the BoxGeometry material-group index of that outward face
// (group order is +X, -X, +Y, -Y, +Z, -Z).
const CUBE_FACES = [
  { dir: [1, 0, 0], label: "RIGHT", group: 0 },
  { dir: [-1, 0, 0], label: "LEFT", group: 1 },
  { dir: [0, 1, 0], label: "BACK", group: 2 },
  { dir: [0, -1, 0], label: "FRONT", group: 3 },
  { dir: [0, 0, 1], label: "TOP", group: 4 },
  { dir: [0, 0, -1], label: "BOTTOM", group: 5 },
];

function cubeLabelTexture(text) {
  const c = document.createElement("canvas"); c.width = c.height = 128;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#e9eef4"; ctx.fillRect(0, 0, 128, 128);
  ctx.strokeStyle = "#9aa6b4"; ctx.lineWidth = 5; ctx.strokeRect(4, 4, 120, 120);
  ctx.fillStyle = "#33414f"; ctx.font = "bold 22px sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(text, 64, 66);
  const tex = new THREE.CanvasTexture(c); tex.anisotropy = 4;
  return tex;
}

const _cubePlain = () => new THREE.MeshStandardMaterial({ color: 0xcfd6de, metalness: 0.0,
  roughness: 0.9 });
const cubeCells = [];   // pickable meshes, each userData.dir (world direction) + .baseMats
const CUBE_STEP = 0.68, CUBE_CELL = 0.6;
for (let i = -1; i <= 1; i++) {
  for (let j = -1; j <= 1; j++) {
    for (let k = -1; k <= 1; k++) {
      if (i === 0 && j === 0 && k === 0) continue;   // no center cell
      const mats = [0, 1, 2, 3, 4, 5].map(_cubePlain);
      // Label a FACE cell (exactly one axis nonzero) on its outward group.
      const nonzero = [i, j, k].filter(v => v !== 0).length;
      if (nonzero === 1) {
        const face = CUBE_FACES.find(f => f.dir[0] === i && f.dir[1] === j && f.dir[2] === k);
        mats[face.group] = new THREE.MeshStandardMaterial({ map: cubeLabelTexture(face.label),
          metalness: 0.0, roughness: 0.85 });
      }
      const cell = new THREE.Mesh(new THREE.BoxGeometry(CUBE_CELL, CUBE_CELL, CUBE_CELL), mats);
      cell.position.set(i * CUBE_STEP, j * CUBE_STEP, k * CUBE_STEP);
      cell.userData.dir = new THREE.Vector3(i, j, k).normalize();
      cell.userData.baseMats = mats;
      cubeScene.add(cell);
      cubeCells.push(cell);
    }
  }
}

function renderGizmo() {
  // Mirror the main camera: look at the cube's origin from the same direction + up as the main
  // view, so the cube's orientation always matches the model on screen.
  const dir = camera.position.clone().sub(controls.target);
  if (dir.lengthSq() < 1e-9) dir.set(0, -1, 0);
  cubeCam.position.copy(dir).setLength(8);
  cubeCam.up.copy(camera.up);
  cubeCam.lookAt(0, 0, 0);
  gizmoRenderer.render(cubeScene, cubeCam);
}

// Hover highlight + click-to-orient on the cube canvas.
const cubeRay = new THREE.Raycaster();
let cubeHovered = null;
function cubeCellAt(ev) {
  const rect = gizmoRenderer.domElement.getBoundingClientRect();
  const p = new THREE.Vector2(((ev.clientX - rect.left) / rect.width) * 2 - 1,
                              -((ev.clientY - rect.top) / rect.height) * 2 + 1);
  cubeRay.setFromCamera(p, cubeCam);
  const hits = cubeRay.intersectObjects(cubeCells, false);
  return hits.length ? hits[0].object : null;
}
function setCubeHover(cell) {
  if (cubeHovered === cell) return;
  if (cubeHovered) cubeHovered.material = cubeHovered.userData.baseMats;
  cubeHovered = cell;
  gizmoRenderer.domElement.style.cursor = cell ? "pointer" : "default";
  if (cell) {
    // A translucent blue overlay material on all 6 sides signals the hovered cell.
    cell.material = cell.userData.baseMats.map(() => new THREE.MeshStandardMaterial({
      color: 0x5aa0ff, metalness: 0.0, roughness: 0.6, emissive: 0x1b3c66 }));
  }
}
gizmoRenderer.domElement.addEventListener("pointermove", ev => setCubeHover(cubeCellAt(ev)));
gizmoRenderer.domElement.addEventListener("pointerleave", () => setCubeHover(null));
gizmoRenderer.domElement.addEventListener("click", ev => {
  const cell = cubeCellAt(ev);
  if (cell) orientCameraTo(cell.userData.dir);
});

// Tween the main camera to look FROM `dir` (world), keeping the current orbit distance + target.
// Spherical interpolation around the target so the camera arcs smoothly. Up is Z, except a
// top/bottom view (dir ~ +/-Z) uses Y so the view is not gimbal-degenerate.
let _orientToken = 0;
function orientCameraTo(dir) {
  const target = controls.target.clone();
  const dist = camera.position.distanceTo(target);
  const endDir = dir.clone().normalize();
  const startDir = camera.position.clone().sub(target).normalize();
  const up = Math.abs(endDir.z) > 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(0, 0, 1);
  // Axis mode locks world-up; free mode (Trackball) tumbles camera.up, so snapping should restore
  // a sane up too. Set it up front so OrbitControls' math is consistent through the tween.
  camera.up.copy(up);
  const q = new THREE.Quaternion().setFromUnitVectors(startDir, endDir);
  const ident = new THREE.Quaternion();
  const token = ++_orientToken;
  const start = performance.now(), DUR = 320;
  (function step(now) {
    if (token !== _orientToken) return;   // superseded by a newer click
    const t = Math.min((now - start) / DUR, 1);
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;  // easeInOutCubic
    const partial = new THREE.Quaternion().slerpQuaternions(ident, q, e);
    const d = startDir.clone().applyQuaternion(partial).multiplyScalar(dist);
    camera.position.copy(target).add(d);
    camera.up.copy(up);
    controls.update();
    if (t < 1) requestAnimationFrame(step);
  })(start);
}

// Face picking: raycast against the model's mesh parts. build123d exports one glTF
// primitive per face in face order, so a part's index into `pickParts` is its index
// into the element-map sidecar's `elements` array.
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
renderer.domElement.addEventListener("click", ev => {
  if (!modelRoot) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(pickParts, false);
  // Assemblies: a click selects the hit mesh's instance (highlight + tree sync); empty space
  // clears. This runs regardless of elementMap (an assembly has none; it is a part concept).
  if (isAssemblyScene()) {
    selectInstance(hits.length ? hits[0].object.userData.instanceId : null);
    return;
  }
  const out = document.getElementById("i-picked");
  if (!elementMap) return;
  if (!hits.length) { out.textContent = "-"; return; }
  const idx = pickParts.indexOf(hits[0].object);
  // Report the clicked mesh's BODY id + material via the sidecar `meshes` list (mesh index ->
  // body), which is body-correct for multibody. If there is no mesh entry (older sidecar) fall
  // back to the flat element lookup (correct for a single body).
  const meshes = (elementMap && elementMap.meshes) || [];
  if (meshes[idx]) {
    const info = meshes[idx];
    out.textContent = `${info.body_id} (${info.material || "no material"})`;
  } else {
    const el = (elementMap.elements || [])[idx];
    out.textContent = el ? `${el.id} (by ${el.created_by})` : "-";
  }
});

// Ambient base, always on; the rig below provides the directional/spot character. The world is
// Z-UP (ground in XY), so a HemisphereLight's sky/ground axis must point up +Z (its default is
// +Y); position (0,0,1) reorients its gradient so "sky" is overhead, not sideways.
const ambient = new THREE.HemisphereLight(0xffffff, 0x2a3340, 0.45);
ambient.position.set(0, 0, 1);
scene.add(ambient);

// A swappable light rig. Each preset clears and rebuilds `lightRig`.
const lightRig = new THREE.Group();
scene.add(lightRig);

// IMPORTANT: this scene is Z-UP (the ground plane lies in XY). Every light's HEIGHT is therefore
// on +Z, not +Y. Authoring positions with +Y as "up" (the old Y-up rig) put the key light in the
// ground plane, which raked light sideways (leaving tall vertical faces near-black) and cast the
// directional shadow sideways across the floor as long streaks. Keep lights high on +Z.
function makeShadowCaster(light) {
  light.castShadow = true;
  light.shadow.mapSize.set(2048, 2048);
  light.shadow.bias = -0.0004;
  const c = light.shadow.camera;
  c.near = 0.5; c.far = 160; c.left = -40; c.right = 40; c.top = 40; c.bottom = -40;
  return light;
}

const LIGHT_PRESETS = {
  sun() {
    ambient.intensity = 0.55;
    const key = makeShadowCaster(new THREE.DirectionalLight(0xfff4e6, 2.0));
    key.position.set(14, -10, 24);   // high on +Z, from the camera's front-right
    // A fill from the opposite, still-elevated side so no large vertical face goes black.
    const fill = new THREE.DirectionalLight(0x9fc7ff, 0.7); fill.position.set(-14, 12, 10);
    return [key, fill];
  },
  natural() {
    // Even, all-around illumination with no harsh single source. Directionals ring the model from
    // four sides AND from below (-Z), plus a bright hemisphere and strong ambient, so the underside
    // is lit too (a top-only rig leaves the bottom dark). All heights are on +Z.
    ambient.intensity = 0.85;
    const hemi = new THREE.HemisphereLight(0xeaf4ff, 0xb8c2d0, 1.0);
    hemi.position.set(0, 0, 1);
    const top = makeShadowCaster(new THREE.DirectionalLight(0xffffff, 0.7));
    top.position.set(8, -10, 24);
    const left = new THREE.DirectionalLight(0xffffff, 0.4); left.position.set(-16, 0, 8);
    const right = new THREE.DirectionalLight(0xffffff, 0.4); right.position.set(16, 0, 8);
    const back = new THREE.DirectionalLight(0xffffff, 0.4); back.position.set(0, 16, 8);
    const under = new THREE.DirectionalLight(0xffffff, 0.35); under.position.set(0, 4, -14);
    return [hemi, top, left, right, back, under];
  },
  studio() {
    ambient.intensity = 0.5;
    const key = makeShadowCaster(new THREE.DirectionalLight(0xffffff, 1.5)); key.position.set(12, -10, 20);
    const fill = new THREE.DirectionalLight(0xcfe0ff, 0.9); fill.position.set(-12, 6, 12);
    const rim = new THREE.DirectionalLight(0xffffff, 1.1); rim.position.set(0, 14, 16);
    return [key, fill, rim];
  },
  spotlight() {
    ambient.intensity = 0.25;
    const spot = makeShadowCaster(new THREE.SpotLight(0xffffff, 900, 0, Math.PI / 6, 0.4, 1.4));
    spot.position.set(6, -4, 30);
    return [spot];
  },
  overcast() {
    ambient.intensity = 1.0;
    const soft = makeShadowCaster(new THREE.DirectionalLight(0xeaf0f6, 0.6));
    soft.position.set(4, -6, 26);
    return [soft];
  },
};

function setLighting(name) {
  lightRig.clear();
  const preset = LIGHT_PRESETS[name] || LIGHT_PRESETS.sun;
  preset().forEach(l => { lightRig.add(l); if (l.target) lightRig.add(l.target); });
  localStorage.setItem("ncad.light", name);
  if (modelRoot) fitShadowCameras();
}

// Size every shadow-casting light's ortho frustum to the current model so the fixed 2048 shadow
// map spends its texels on the model (a frustum many times the model size gives coarse, streaky
// shadows). Called from frameModel + setLighting. Uses the framed model radius; the model sits
// centered at the origin lifted by half its height on +Z.
let shadowRadius = 40;
function fitShadowCameras() {
  const extent = Math.max(shadowRadius, 1e-3);
  lightRig.traverse(o => {
    if (o.isLight && o.castShadow && o.shadow && o.shadow.camera.isOrthographicCamera) {
      const c = o.shadow.camera;
      c.left = -extent; c.right = extent; c.top = extent; c.bottom = -extent;
      c.near = extent / 100; c.far = extent * 8;
      c.updateProjectionMatrix();
    }
  });
}

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.ShadowMaterial({ opacity: 0.32 })
);
// Z-up world: PlaneGeometry lies in XY by default, which is already the floor, so no
// rotation is needed (the old -90deg-about-X tilt was for a Y-up scene).
ground.receiveShadow = true; scene.add(ground);

// GridHelper is built in the XZ plane (Y-up); rotate it into XY for the Z-up floor.
let grid = new THREE.GridHelper(80, 80, cssColor("--grid-major"), cssColor("--grid-minor"));
grid.rotation.x = Math.PI / 2;
scene.add(grid);

// A small poly axis gizmo: three thin colored cylinders (X red / Y green / Z blue) + a center
// sphere. Poly meshes take real thickness and do NOT z-fight like GL LINES (AxesHelper), fixing the
// world-origin stutter. `size` is the axis length; opts.radius scales the shaft thickness. Reused
// for the world origin, instance origins, connector triads, and joint-glyph bases (DRY).
function buildAxisGizmo(size, opts) {
  opts = opts || {};
  const r = opts.radius != null ? opts.radius : size * 0.04;
  const g = new THREE.Group();
  g.userData.isGizmo = true;
  const axes = [
    { color: 0xff5555, rot: [0, 0, -Math.PI / 2], off: [size / 2, 0, 0] },  // +X
    { color: 0x55ff55, rot: [0, 0, 0], off: [0, size / 2, 0] },             // +Y
    { color: 0x5599ff, rot: [Math.PI / 2, 0, 0], off: [0, 0, size / 2] },   // +Z
  ];
  for (const a of axes) {
    const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, size, 12),
                             new THREE.MeshBasicMaterial({ color: a.color }));
    m.rotation.set(a.rot[0], a.rot[1], a.rot[2]);
    m.position.set(a.off[0], a.off[1], a.off[2]);
    g.add(m);
  }
  g.add(new THREE.Mesh(new THREE.SphereGeometry(r * 1.6, 12, 12),
                       new THREE.MeshBasicMaterial({ color: 0xdddddd })));
  return g;
}

// True if the object is inside a gizmo group (so it is excluded from the pick raycast set).
function _inGizmo(o) {
  for (let p = o; p; p = p.parent) if (p.userData && p.userData.isGizmo) return true;
  return false;
}

// A thin arc line in the plane perpendicular to `dir` (a rotation-freedom marker). Color-coded.
function _rotArc(dir, size, color) {
  // Two in-plane basis vectors perpendicular to `dir`, so the arc lies around the rotation axis.
  const up = Math.abs(dir.z) > 0.9 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 0, 1);
  const u = new THREE.Vector3().crossVectors(dir, up).normalize();
  const w = new THREE.Vector3().crossVectors(dir, u).normalize();
  const rad = size * 0.6, pts = [];
  for (let i = 0; i <= 32; i++) {
    const t = (i / 32) * Math.PI * 1.5;   // a 270deg arc reads as "turns about this axis"
    pts.push(u.clone().multiplyScalar(Math.cos(t) * rad).add(w.clone().multiplyScalar(Math.sin(t) * rad)));
  }
  return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
                        new THREE.LineBasicMaterial({ color }));
}

// A thin double-headed arrow line along `dir` (a translation-freedom marker). Color-coded.
function _transArrow(dir, size, color) {
  const h = size * 0.6, head = size * 0.16;
  const tip = dir.clone().multiplyScalar(h), tail = dir.clone().multiplyScalar(-h);
  // A perpendicular for the arrowhead barbs.
  const up = Math.abs(dir.z) > 0.9 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 0, 1);
  const perp = new THREE.Vector3().crossVectors(dir, up).normalize().multiplyScalar(head * 0.5);
  const pts = [tail, tip,
    tip, tip.clone().sub(dir.clone().multiplyScalar(head)).add(perp),
    tip, tip.clone().sub(dir.clone().multiplyScalar(head)).sub(perp),
    tail, tail.clone().add(dir.clone().multiplyScalar(head)).add(perp),
    tail, tail.clone().add(dir.clone().multiplyScalar(head)).sub(perp)];
  return new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts),
                               new THREE.LineBasicMaterial({ color }));
}

// A signature-keyed joint glyph at a joint's world connector frame: rotation -> arc about the axis;
// translation -> double arrow along it; cylindrical -> both; ball -> three arcs; screw -> arc+arrow
// on Z; fixed -> a cube. The signature axis "Z"/"X"/"Y" maps to that FRAME's vector (not world), so
// a tilted joint shows its freedom about the tilted axis. `frame` = {origin,x,y,z} (world, metres).
function buildJointGlyph(joint, frame, size) {
  const g = new THREE.Group();
  g.userData.isGizmo = true;
  const axisVec = { X: frame.x, Y: frame.y, Z: frame.z, line: frame.z };
  const sig = joint.signature || [];
  if (joint.type === "fixed" || sig.length === 0) {
    g.add(new THREE.Mesh(new THREE.BoxGeometry(size * 0.4, size * 0.4, size * 0.4),
                         new THREE.MeshBasicMaterial({ color: 0x999999 })));
  }
  for (const a of sig) {
    const v = axisVec[a.axis] || frame.z;
    const dir = new THREE.Vector3(v[0], v[1], v[2]).normalize();
    if (a.motion === "rotation" || a.motion === "screw") g.add(_rotArc(dir, size, 0xffaa33));
    if (a.motion === "translation" || a.motion === "screw") g.add(_transArrow(dir, size, 0x33ccff));
  }
  g.position.set(frame.origin[0], frame.origin[1], frame.origin[2]);
  return g;
}

// A small poly gizmo fixed at the WORLD origin (X=red, Y=green, Z=blue), always visible as a
// reference. A poly gizmo (not an AxesHelper) because GL LINES are 1px-capped and z-fight the grid,
// causing a stutter. Its size is refreshed to the current model in frameModel (scaled from 0.02).
const worldOrigin = buildAxisGizmo(0.02, { radius: 0.02 * 0.02 });  // thin shafts (2% of length)
worldOrigin.name = "worldOrigin";
scene.add(worldOrigin);

// Recolor the 3D scene from the current theme's CSS variables. Called on theme change.
function applySceneTheme() {
  const bg = cssColor("--scene-bg");
  scene.background = bg;
  if (scene.fog) scene.fog.color = bg;
  const major = cssColor("--grid-major"), minor = cssColor("--grid-minor");
  const gm = grid.material;
  (Array.isArray(gm) ? gm : [gm]).forEach((m, i) => { m.color = i === 0 ? major : minor; });
  const edgeColor = cssColor("--edge");
  edges.forEach(e => { e.material.color = edgeColor; });
}

// Material presets for "Material" mode.
const MATERIALS = [
  { name: "Concrete",  color: 0xb8bdc4, metalness: 0.05, roughness: 0.9 },
  { name: "Brick",     color: 0xa8533a, metalness: 0.0,  roughness: 0.85 },
  { name: "Red brick", color: 0x8c3b2b, metalness: 0.0,  roughness: 0.9 },
  { name: "Timber",    color: 0xb9824f, metalness: 0.05, roughness: 0.6 },
  { name: "Oak",       color: 0x9c6b3f, metalness: 0.05, roughness: 0.55 },
  { name: "Sandstone", color: 0xd8c9a3, metalness: 0.0,  roughness: 0.8 },
  { name: "Plaster",   color: 0xeae6dd, metalness: 0.0,  roughness: 0.95 },
  { name: "Stucco",    color: 0xc9b79a, metalness: 0.0,  roughness: 0.85 },
  { name: "Steel",     color: 0x9aa6b4, metalness: 0.85, roughness: 0.35 },
  { name: "Copper",    color: 0xb87333, metalness: 0.9,  roughness: 0.4 },
  { name: "Glass",     color: 0x8fb8d8, metalness: 0.1,  roughness: 0.05, opacity: 0.45 },
  { name: "Slate",     color: 0x4a525c, metalness: 0.1,  roughness: 0.7 },
  { name: "Marble",    color: 0xe8e8ea, metalness: 0.05, roughness: 0.3 },
  { name: "Terracotta",color: 0xc06a4b, metalness: 0.0,  roughness: 0.8 },
  { name: "Graphite",  color: 0x2f3640, metalness: 0.3,  roughness: 0.6 },
  { name: "Mint",      color: 0x8fd4bf, metalness: 0.05, roughness: 0.55 },
];
let materialIndex = parseInt(localStorage.getItem("ncad.material") || "0", 10) || 0;

// Smooth shading: use the per-vertex normals ncad exports in the glTF so curved surfaces
// (a swept tube, a fillet) read as round rather than faceted. flatShading would discard
// those normals and light each triangle flat. Geometry/mesh are unchanged, this is display
// only (the tessellation density is set at export time, kernel side).
const SOLID = new THREE.MeshStandardMaterial({ color: 0xc6d3e2, metalness: 0.05, roughness: 0.85, flatShading: false });
const WIRE = new THREE.MeshBasicMaterial({ color: 0x5aa0ff, wireframe: true });
const XRAY = new THREE.MeshStandardMaterial({ color: 0x5aa0ff, transparent: true, opacity: 0.26, depthWrite: false });
function materialMat() {
  const m = MATERIALS[materialIndex];
  return new THREE.MeshStandardMaterial({ color: m.color, metalness: m.metalness, roughness: m.roughness });
}

// ---- By-material coloring (color each body by its document material) ----
// The mapping is GLOBAL by material name and lives in localStorage, so a material means the
// same color across every model. "__none__" is the reserved bucket for bodies with no material.
const MAT_COLORS_KEY = "ncad.materialColors";
const NO_MATERIAL = "__none__";
// A stable distinct palette so a fresh multi-material model is legible; the index is chosen by
// a deterministic hash of the material name, so a material keeps its color between loads.
const MAT_PALETTE = ["#c9ccd1", "#b87333", "#9aa6b4", "#b9824f", "#8fd4bf", "#c06a4b",
                     "#8fb8d8", "#d8c9a3", "#a8533a", "#6a7b8c"];
let matColors = (() => {
  try { return JSON.parse(localStorage.getItem(MAT_COLORS_KEY)) || {}; }
  catch (e) { return {}; }
})();
function paletteColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return MAT_PALETTE[h % MAT_PALETTE.length];
}
// Resolution order: user-assigned (localStorage) > authored appearance color > stable palette.
// Unassigned bodies default to the neutral solid gray until the user colors the "(no material)".
function colorFor(name, appearanceColor) {
  const key = name || NO_MATERIAL;
  if (matColors[key]) return matColors[key];
  if (name && appearanceColor) return appearanceColor;
  if (!name) return "#c6d3e2";
  return paletteColor(name);
}

// Build a By-Material MeshStandardMaterial from a resolved color + the body/instance `appearance`
// dict. Honors appearance.opacity (< 1 => transparent, e.g. glass), appearance.metalness, and
// appearance.roughness; each falls back to a matte-solid default when absent. This is the single
// place By-Material turns authored appearance into a THREE material, so glass declared in the
// document (opacity < 1) actually renders see-through in the viewer, for ANY material (not a glass
// special-case). depthWrite is disabled on transparent materials so panes blend without z-fighting.
function byMaterialMat(color, appearance) {
  const a = appearance || {};
  const opacity = (typeof a.opacity === "number") ? a.opacity : 1;
  const params = {
    color: color,
    metalness: (typeof a.metalness === "number") ? a.metalness : 0.05,
    roughness: (typeof a.roughness === "number") ? a.roughness : 0.85,
  };
  if (opacity < 1) { params.transparent = true; params.opacity = opacity; params.depthWrite = false; }
  return new THREE.MeshStandardMaterial(params);
}

// Per-exported-mesh body/material, from the sidecar `meshes` list (one entry per glTF mesh, in
// export order). pickParts is collected in that same glb mesh order, so meshInfo(i) maps mesh i
// -> its body id + material. This is positional, not name-based: glTF mesh names do not survive
// GLTFLoader reliably, and a global face index does not match the multibody glTF face order.
function meshInfo(i) {
  const meshes = (elementMap && elementMap.meshes) || [];
  return meshes[i] || { body_id: null, material: null, appearance_color: null };
}

let modelRoot = null, edges = [], mode = "solid", showEdges = true, castShadows = true;
let pickParts = [], elementMap = null;
// Assembly origin gizmos + their toggle state, declared here (before bindVcToggle uses them,
// which runs at load) to avoid a temporal-dead-zone error.
let originGizmos = [];  // per-instance origin axes helpers (toggled by the Origins control)
let showOrigins = localStorage.getItem("ncad.origins") === "1";
// Mate connector triads (bucket 5.1): per-connector frame markers, toggled by the Connectors
// control. Declared here (before bindVcToggle runs at load) to avoid a temporal-dead-zone error.
let connectorGizmos = [];
let showConnectors = localStorage.getItem("ncad.connectors") === "1";
// Joint-freedom glyphs (bucket 5.5): per-joint free-axis markers + dashed coupling links, toggled
// by the Joints control. Declared before bindVcToggle runs to avoid a temporal-dead-zone error.
let jointGizmos = [];
let showJoints = localStorage.getItem("ncad.joints") === "1";
// Motion trace curves (bucket 6.1): a THREE.Line per declared trace, added to modelRoot (world
// path), toggled by the Traces control. Default on (localStorage null -> on).
let traceLines = [];
let showTraces = localStorage.getItem("ncad.traces") !== "0";
// A stable palette for trace curves (distinct from the material palette).
const TRACE_COLORS = [0xff5aa0, 0x5aff9a, 0xffd166, 0x9a7cff, 0x5ad1ff, 0xff8c42];
// Per-instance material {instanceId: {material, appearance_color}} from the sidecar, for the
// assembly By-Material view (bucket 5.6). Empty in Parts mode (that path uses the element map).
let assemblyMaterials = {};
// Parts | Assemblies view mode (persisted). Declared HERE, before the initial setMode() call
// (which reaches distinctMaterials -> reads viewMode); a later `let` would be a temporal dead
// zone and throw during init, blanking the whole viewer.
let viewMode = localStorage.getItem("ncad.viewMode") || "parts";
// Both Assemblies and Motion render a composed assembly scene (instances placed by matrices), so
// scene behavior (pick-by-instance, per-instance material, connector/joint overlays, the timeline)
// keys off this, while the model-list source + spec kind stay per-mode.
function isAssemblyScene() { return viewMode === "assemblies" || viewMode === "motion"; }
// Assembly selection / highlight / isolate (bucket 5.5). instanceMeshMap: instanceId -> [meshes],
// published by loadAssembly once all glbs load. Declared before bindVcToggle (isolate) runs.
let instanceMeshMap = {};
let selectedInstances = [];
let isolateOn = localStorage.getItem("ncad.isolate") === "1";
const loader = new GLTFLoader();

// Select one instance (or none) and re-apply highlight/isolate + tree active styling.
function selectInstance(id) { selectedInstances = id ? [id] : []; _applySelection(); }
// Select a set (used by a mate/joint/coupling chip highlighting both connected instances).
function selectInstances(ids) { selectedInstances = (ids || []).filter(Boolean); _applySelection(); }
function clearSelection() { selectedInstances = []; _applySelection(); }
function _applySelection() { refreshInstanceVisuals(); syncTreeActive(); }

// Capture each instance mesh's BASE material (what applyMode assigned). applyMode owns the base and
// calls this before refreshInstanceVisuals, so highlight/isolate always derive from a clean base
// rather than a prior clone (which would clone-a-clone or leak a mutated shared material).
function captureInstanceBases() {
  for (const id in instanceMeshMap)
    for (const m of instanceMeshMap[id]) m.userData._baseMat = m.material;
}

// The single place that applies per-instance visual state (highlight + isolate). Because applyMode
// assigns ONE shared material object (SOLID/XRAY/...) to every mesh, per-instance state MUST use a
