<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ncad 3D viewer</title>
<script>
  // Apply the saved theme before first paint to avoid a flash of the wrong theme.
  (function () {
    var choice = localStorage.getItem("ncad.theme") || "system";
    var dark = choice === "dark" || (choice === "system" &&
      window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  })();
</script>
<style>
  /* ============================================================================
     ncad viewer styles
     Sections: Design tokens (theme) · Base · Sidebar · Spec + Models · Toast +
     swatches + toggles · Stage · Floating controls · Floating panels · Info
     Colors come from CSS variables (see tokens); [data-theme] swaps the palette.
     ============================================================================ */

  /* --- Design tokens (dark = default, light theme overrides below) --- */
  :root, :root[data-theme="dark"] {
    --bg: #0d1117; --bg-2: #11161f; --panel: #161d29; --panel-2: #1e2735;
    --text: #e8eef5; --muted: #8a97a8; --accent: #5aa0ff; --accent-2: #2bd4a8;
    --border: #283546; --shadow: 0 8px 30px rgba(0,0,0,.45);
    /* Themed tokens (dark): text on accent fills, translucent panels, hint, 3D scene. */
    --on-accent: #04101f; --panel-translucent: rgba(22,29,41,.82);
    --panel-strong: rgba(22,29,41,.92); --hint-bg: rgba(13,17,23,.72);
    --scene-bg: #0d1117; --grid-major: #33455c; --grid-minor: #1b2533; --edge: #0d1117;
    --accent-tint: rgba(90,160,255,.14);
  }
  :root[data-theme="light"] {
    --bg: #eef1f5; --bg-2: #e4e9f0; --panel: #ffffff; --panel-2: #eef2f7;
    --text: #1a2230; --muted: #5c6675; --accent: #2f74d0; --accent-2: #12a67f;
    --border: #d0d8e2; --shadow: 0 8px 30px rgba(30,50,80,.14);
    --on-accent: #ffffff; --panel-translucent: rgba(255,255,255,.86);
    --panel-strong: rgba(255,255,255,.94); --hint-bg: rgba(238,241,245,.8);
    --scene-bg: #dfe5ec; --grid-major: #b9c4d2; --grid-minor: #cfd7e2; --edge: #6b7686;
    --accent-tint: rgba(47,116,208,.13);
  }
  /* --- Base --- */
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    transition: background .2s ease, color .2s ease; }
  #app { display: flex; width: 100%; height: 100%; overflow: hidden; position: relative; }

  /* --- Sidebar --- */
  #sidebar { width: 286px; flex: none; background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 20px; gap: 22px; overflow-y: auto; }
  /* Draggable separator to resize the sidebar; width persists in localStorage. */
  #sidebar-resizer { flex: none; width: 3px; cursor: col-resize; background: transparent;
    border-right: 1px solid var(--border); transition: background .15s; }
  #sidebar-resizer:hover, #sidebar-resizer.dragging { background: #7cc4ff;
    box-shadow: 0 0 8px 1px rgba(124, 196, 255, .6); }
  body.resizing-sidebar { cursor: col-resize; user-select: none; }
  /* Top bar: brand + theme toggle, pinned to the top of the sidebar. */
  #topbar { position: sticky; top: -20px; z-index: 3; margin: -20px -20px 0; padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border-bottom: 1px solid var(--border); }
  #topbar .brand { flex: 1; }
  /* Single toggle that cycles light -> system -> dark, showing the current mode's icon. */
  .theme-toggle { display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 28px; color: var(--muted); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
    transition: color .15s, border-color .15s; }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
  .theme-toggle span { display: inline-flex; }
  .brand { display: flex; align-items: baseline; gap: 2px; }
  .brand h1 { font-size: 18px; margin: 0; font-weight: 700; letter-spacing: 0.3px; }
  .brand .dot { color: var(--accent-2); font-size: 22px; line-height: 0; }
  .brand .sub { margin-left: auto; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); padding-top: 4px; }
  .label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 9px; font-weight: 600; }
  select, .btn { font: inherit; font-size: 13px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px;
    padding: 9px 11px; width: 100%; transition: border-color .15s, background .15s; }
  select:hover, .btn:hover { border-color: var(--accent); cursor: pointer; }
  .spec-row { display: flex; gap: 8px; align-items: stretch; }
  .combo { position: relative; flex: 1; }
  #spec-search { width: 100%; font: inherit; font-size: 13px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px;
    padding: 8px 32px 8px 10px; }
  #spec-search:focus { border-color: var(--accent); outline: none; }
  /* Clear (x) button: sits at the right of the search, red on hover. Hidden when empty. */
  .combo-clear { position: absolute; top: 50%; right: 5px; transform: translateY(-50%);
    display: inline-flex; align-items: center; justify-content: center; width: 22px;
    height: 22px; padding: 0; color: var(--muted); background: none; border: none;
    border-radius: 50%; cursor: pointer; transition: color .15s, background .15s; }
  .combo-clear:hover { color: #e74c3c; background: var(--panel); }
  .combo-clear[hidden] { display: none; }
  .spec-tree { position: absolute; z-index: 20; left: 0; right: 0; top: calc(100% + 4px);
    max-height: 40vh; overflow: auto; background: var(--panel); border: 1px solid var(--border);
    border-radius: 9px; padding: 6px; }
  .spec-tree .dir { font-size: 11px; color: var(--muted); padding: 6px 6px 2px;
    font-family: inherit; }
  .spec-tree .spec { padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .spec-tree .spec:hover, .spec-tree .spec.active { background: var(--panel-2); color: var(--accent); }
  .icon-btn { display: inline-flex; align-items: center; justify-content: center;
    width: 36px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text); cursor: pointer; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  /* --- Models list --- */
  .model-list { display: flex; flex-direction: column; gap: 4px; max-height: 30vh; overflow: auto; }
  .model-row { display: flex; align-items: center; gap: 6px; min-height: 40px;
    padding: 4px 9px; background: var(--panel-2); border: 1px solid transparent;
    border-radius: 8px; cursor: pointer; }
  .model-row:hover { border-color: var(--border); }
  .model-row.active { border-color: var(--accent); }
  .model-row .name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Actions stay in layout at a fixed row height and only fade in on hover, so the row
     never resizes; toggling display caused a jittery height jump on hover. */
  .model-row .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s;
    pointer-events: none; }
  .model-row:hover .row-actions { opacity: 1; pointer-events: auto; }
  .row-actions .icon-btn { width: 26px; height: 26px; }
  .row-actions .act-regen:hover { border-color: #2ecc71; color: #2ecc71; }
  .row-actions .act-delete:hover { border-color: #e74c3c; color: #e74c3c; }
  #toast { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border); border-radius: 9px;
    padding: 10px 16px; font-size: 13px; color: var(--text); opacity: 0;
    transition: opacity .25s; pointer-events: none; z-index: 50; max-width: 70%; }
  #toast.show { opacity: 1; }
  #toast.error { border-color: var(--no, #d9534f); }
  /* --- Material swatches + scene toggles (shared) --- */
  .swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .swatch { aspect-ratio: 1; border-radius: 6px; border: 1.5px solid var(--border);
    cursor: pointer; transition: transform .12s, border-color .12s; }
  .swatch:hover { transform: translateY(-2px); }
  .swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--accent); }

  .toggle-row { display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; color: var(--text); padding: 5px 0; }
  .switch { position: relative; width: 40px; height: 22px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 22px; transition: .2s; }
  .slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 2px;
    top: 2px; background: var(--muted); border-radius: 50%; transition: .2s; }
  input:checked + .slider { background: var(--accent); border-color: var(--accent); }
  input:checked + .slider:before { transform: translateX(18px); background: var(--on-accent); }
  .spacer { margin-top: auto; }

  /* --- Stage (3D viewport) --- */
  #stage { flex: 1 1 0; min-width: 0; position: relative; overflow: hidden; }
  /* The canvas always fills the stage via CSS, so during the sidebar slide it scales
     smoothly; the backing resolution is refit once when the transition ends (no
     per-frame setSize, which would recreate the drawing buffer and look like a reload). */
  #stage canvas { display: block; width: 100% !important; height: 100% !important; }
  canvas { display: block; }
  #spinner { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--muted); font-size: 14px; pointer-events: none; }
  #hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: var(--muted); background: var(--hint-bg);
    padding: 7px 16px; border-radius: 22px; border: 1px solid var(--border);
    backdrop-filter: blur(6px); }

  /* Floating viewport controls (translucent, movable/snapping, icon-first) */
  #viewport-controls { position: absolute; z-index: 40; display: flex;
    flex-direction: column; gap: 4px; padding: 5px; width: max-content;
    background: var(--panel-translucent); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow); backdrop-filter: blur(10px); }
  .vc-head { display: flex; align-items: center; gap: 6px; position: relative; }
  .vc-grip { display: inline-flex; align-items: center; justify-content: center;
    color: var(--muted); background: none; border: none; cursor: grab; padding: 2px; }
  .vc-grip:active { cursor: grabbing; }
  .vc-head-actions { display: flex; gap: 4px; margin-left: auto; }
  .vc-cfg { display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; color: var(--muted); background: none;
    border: 1px solid transparent; border-radius: 7px; cursor: pointer; }
  .vc-cfg:hover, .vc-cfg.active { color: var(--accent); border-color: var(--border); }
  .vc-corner-pop { position: absolute; top: calc(100% + 6px); right: 0; z-index: 5;
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 7px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 9px; }
  .vc-corner-pop[hidden] { display: none; }
  .vc-corner-pop button { width: 26px; height: 20px; border-radius: 5px;
    background: var(--panel-2); border: 1px solid var(--border); cursor: pointer;
    position: relative; }
  .vc-corner-pop button:hover { border-color: var(--accent); }
  .vc-corner-pop button::after { content: ""; position: absolute; width: 8px; height: 6px;
    border-radius: 2px; background: var(--accent); }
  .vc-corner-pop button[data-corner="top-left"]::after { top: 3px; left: 3px; }
  .vc-corner-pop button[data-corner="top-right"]::after { top: 3px; right: 3px; }
  .vc-corner-pop button[data-corner="bottom-left"]::after { bottom: 3px; left: 3px; }
  .vc-corner-pop button[data-corner="bottom-right"]::after { bottom: 3px; right: 3px; }
  .vc-group { display: flex; gap: 3px; }
  .vc-sep { height: 1px; background: var(--border); margin: 1px 2px; }
  .vc-btn { display: inline-flex; align-items: center; gap: 6px; justify-content: center;
    min-width: 30px; height: 30px; padding: 0 6px; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px;
    cursor: pointer; transition: color .15s, border-color .15s, background .15s; }
  /* Label collapses to zero width (not display:none) so show/hide animates smoothly;
     the icon stays anchored and the button grows/shrinks without a jump. */
  .vc-btn .vc-label { font-size: 12px; white-space: nowrap; overflow: hidden;
    max-width: 0; opacity: 0; margin-left: -6px;
    transition: max-width .2s ease, opacity .2s ease, margin-left .2s ease; }
  .vc-btn:hover { border-color: var(--accent); color: var(--accent); }
  .vc-btn.active { color: var(--accent); border-color: var(--accent);
    background: var(--accent-tint); }
  /* Distinct hover glow colors for scene toggles + reset */
  #vc-light:hover { color: #ffd166; border-color: #ffd166; }
  .vc-toggle[data-toggle="rotate"]:hover { color: #7cc4ff; border-color: #7cc4ff; }
  #vc-reset:hover { color: #ff8f6b; border-color: #ff8f6b; }
  /* Lighting: cycle button + caret dropdown of icon options */
  .vc-light-wrap { position: relative; display: flex; }
  .vc-light-wrap #vc-light { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .vc-caret { display: inline-flex; align-items: center; justify-content: center; width: 16px;
    height: 30px; color: var(--muted); background: var(--panel-2);
    border: 1px solid var(--border); border-left: none; border-radius: 0 8px 8px 0; cursor: pointer; }
  .vc-caret:hover { color: #ffd166; border-color: #ffd166; }
  .vc-menu { position: absolute; top: calc(100% + 5px); left: 0; z-index: 6; min-width: 128px;
    display: flex; flex-direction: column; gap: 1px; padding: 4px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: var(--shadow); }
  .vc-menu[hidden] { display: none; }
  .vc-menu button { display: flex; align-items: center; gap: 8px; padding: 5px 8px;
    font-size: 12.5px; color: var(--text); background: none; border: 1px solid transparent;
    border-radius: 6px; cursor: pointer; text-align: left; }
  .vc-menu .vc-mi svg { width: 15px; height: 15px; }
  .vc-menu button:hover, .vc-menu button.active { background: var(--panel-2); color: #ffd166;
    border-color: var(--border); }
  .vc-mi { display: inline-flex; color: currentColor; }
  #vc-light-icon { display: inline-flex; }
  .vc-sub { display: flex; flex-direction: column; gap: 5px; padding: 2px; }
  .vc-sub[hidden] { display: none; }
  .vc-sub-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); }
  #vc-material .swatches { grid-template-columns: repeat(8, 14px); }
  #vc-material .swatch { width: 14px; }
  /* Show-text mode: reveal labels, stack groups vertically for readability */
  #viewport-controls.show-text .vc-label { max-width: 140px; opacity: 1; margin-left: 0; }
  #viewport-controls.show-text .vc-group { flex-direction: column; }
  #viewport-controls.show-text .vc-btn { justify-content: flex-start; }
  /* Only the corner-anchor button animates position (adds .vc-animate briefly). Manual
     drag and edge-snap stay instant/1:1 because they never carry this class. */
  #viewport-controls.vc-animate { transition: left .28s ease, right .28s ease,
    top .28s ease, bottom .28s ease; }

  /* --- Floating content panels (BOM, Plan): top-right, collapsible --- */
  /* --- Right sidebar (BOM / Plan / Hierarchy), collapsible with a drag separator ---
     Width is a CSS variable so collapse can animate it to zero smoothly (display:none
     cannot transition). The rail animates its own width in the opposite direction. */
  :root { --rs-width: 320px; }
  #right-resizer { flex: none; width: 3px; cursor: col-resize; background: transparent;
    border-left: 1px solid var(--border); transition: background .15s; }
  #right-resizer:hover, #right-resizer.dragging { background: #7cc4ff;
    box-shadow: 0 0 8px 1px rgba(124, 196, 255, .6); }
  #right-sidebar { flex: none; width: var(--rs-width); overflow: hidden;
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border-left: 1px solid var(--border); display: flex; flex-direction: column;
    min-width: 0; transition: width .25s ease; }
  #right-sidebar .tabs { display: flex; border-bottom: 1px solid var(--border); flex: none;
    padding-right: 34px; }
  #right-sidebar .tab { flex: 1; font: inherit; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .6px; color: var(--muted); background: none;
    border: none; border-bottom: 2px solid transparent; padding: 11px 4px; cursor: pointer; }
  #right-sidebar .tab:hover { color: var(--text); }
  #right-sidebar .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  #right-sidebar .tab-head { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    flex: none; border-bottom: 1px solid var(--border); }
  #right-sidebar .tab-head .grow { flex: 1; }
  .rs-icon-btn { width: 26px; height: 24px; display: inline-flex; align-items: center;
    justify-content: center; color: var(--muted); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 7px; cursor: pointer; }
  .rs-icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .rs-icon-btn.active { color: var(--accent); border-color: var(--accent); }
  /* A class-level display would otherwise override the HTML `hidden` attribute. */
  .rs-icon-btn[hidden] { display: none; }
  .tab-panel { display: none; flex: 1; overflow: auto; padding: 12px 14px; }
  .tab-panel.active { display: block; }
  #tab-plan.tab-panel { padding: 0; }
  /* The plan SVG is drawn dark-on-white, so its container is white only when it holds
     a plan; the empty/placeholder state uses the normal panel padding + theme colors. */
  #tab-plan.tab-panel:not(.has-plan) { padding: 12px 14px; }
  .bom-row { display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; padding: 7px 0; border-top: 1px solid var(--border); }
  .bom-row:first-child { border-top: none; }
  .bom-row .k { color: var(--muted); }
  .bom-row .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .bom-row .u { color: var(--muted); font-weight: 400; font-size: 11px; margin-left: 3px; }
  .panel-empty { font-size: 12px; color: var(--muted); padding: 8px 0; }
  /* Sketch constraint-status badge: collapsible header + per-sketch rows. */
  .sketch-status { margin-bottom: 8px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--panel-2); overflow: hidden; }
  .sketch-status-head { display: flex; align-items: center; gap: 6px; width: 100%;
    padding: 6px 9px; background: none; border: 0; color: var(--text);
    font-size: 12px; font-weight: 600; cursor: pointer; text-align: left; }
  .sketch-status-caret { display: inline-block; font-size: 9px; color: var(--muted);
    transition: transform .12s; }
  .sketch-status.open .sketch-status-caret { transform: rotate(90deg); }
  .sketch-status-list { padding: 2px 9px 7px; }
  .sketch-status-row { display: flex; align-items: center; gap: 6px; padding: 3px 0;
    font-size: 12px; font-variant-numeric: tabular-nums; }
  .sketch-status-row .sid { font-weight: 600; }
  .sketch-status-row .dof { color: var(--muted); }
  .sketch-status-row .fail { color: #e74c3c; margin-left: auto; }
  .status-dot { width: 9px; height: 9px; border-radius: 50%; flex: none;
    background: var(--muted); }
  .status-dot.well { background: #2ecc71; }
  .status-dot.under { background: #f2c14e; }
  .status-dot.over, .status-dot.inconsistent { background: #e74c3c; }
  /* White backing only when a real plan SVG is present (see .has-plan on the tab). */
  #tab-plan.has-plan #plan-body { padding: 12px; background: #ffffff; }
  #plan-body svg { width: 100%; height: auto; display: block; }

  /* Collapsed rail: a narrow bar with a reopen icon at the top. Its width animates
     from 0 so open/close slides smoothly alongside the sidebar. */
  #right-rail { flex: none; width: 0; overflow: hidden; background: var(--panel);
    border-left: 1px solid var(--border); display: flex; flex-direction: column;
    align-items: center; padding-top: 8px; transition: width .25s ease; }
  body.right-collapsed #right-sidebar { width: 0; border-left: none; }
  body.right-collapsed #right-resizer { display: none; }
  body.right-collapsed #right-rail { width: 30px; }
  #right-rail .rail-label { writing-mode: vertical-rl; margin-top: 38px; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; color: var(--muted); user-select: none; }
  /* One fixed toggle, always at the same top-right spot (the rail's rest position). */
  #right-toggle { position: absolute; top: 8px; right: 3px; z-index: 6; background: var(--panel); }
  #right-toggle svg { transition: transform .25s ease; }
  #right-toggle.collapsed svg { transform: scaleX(-1); }

  /* --- Blender-style hierarchy tree --- */
  .tree-row { display: flex; align-items: center; gap: 5px; font-size: 12.5px;
    padding: 2px 0; white-space: nowrap; color: var(--text); }
  .tree-twist { width: 12px; flex: none; color: var(--muted); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; font-size: 9px; }
  .tree-twist.leaf { visibility: hidden; }
  .tree-ico { width: 15px; height: 15px; flex: none; color: var(--muted);
    display: inline-flex; align-items: center; justify-content: center; }
  .tree-ico.part { color: var(--accent-2); }
  .tree-ico.feature { color: var(--accent); }
  .tree-name { overflow: hidden; text-overflow: ellipsis; }
  .tree-op { color: var(--muted); font-size: 11px; margin-left: 4px; }
  .tree-children { margin-left: 12px; border-left: 1px solid var(--border);
    padding-left: 4px; }
  .tree-collapsed > .tree-children { display: none; }
  #tab-hierarchy.hide-text .tree-name, #tab-hierarchy.hide-text .tree-op { display: none; }

  /* --- Orientation gizmo (top-right of the viewport). 128px matches the ViewHelper's
     fixed draw size; non-interactive (orientation readout only). --- */

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { TrackballControls } from "three/addons/controls/TrackballControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { ViewHelper } from "three/addons/helpers/ViewHelper.js";

const stage = document.getElementById("stage");
const spinner = document.getElementById("spinner");

// Read a resolved CSS variable (so the 3D scene shares the same palette as the DOM).
function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function cssColor(name) { return new THREE.Color(cssVar(name)); }

const scene = new THREE.Scene();
scene.background = cssColor("--scene-bg");
scene.fog = new THREE.Fog(cssColor("--scene-bg"), 40, 120);

const camera = new THREE.PerspectiveCamera(45, stage.clientWidth / stage.clientHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(stage.clientWidth, stage.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

// Orientation mode: "axis" keeps up-vector fixed and revolves around the vertical
// axis (OrbitControls, good for grounded parts); "free" allows full trackball tumble
// so the model can be overturned completely (TrackballControls). `controls` is
// swapped between the two, preserving the camera position and orbit target.
let controls = null;
let orientationMode = "axis";
let autoRotate = false;

function makeControls(mode) {
  if (mode === "free") {
    const c = new TrackballControls(camera, renderer.domElement);
    c.rotateSpeed = 3.0;
    c.panSpeed = 0.8;
    c.dynamicDampingFactor = 0.15;
    return c;
  }
  const c = new OrbitControls(camera, renderer.domElement);
  c.enableDamping = true;
  c.dampingFactor = 0.08;
  return c;
}

function setOrientationMode(mode) {
  const target = controls ? controls.target.clone() : new THREE.Vector3(0, 0, 0);
  if (controls) controls.dispose();
  orientationMode = mode;
  // TrackballControls tilts camera.up while tumbling; axis mode must restore world-up
  // so OrbitControls behaves exactly as it did originally (revolve around vertical,
  // still able to look up at the underside). Without this the locked-in view stays
  // tilted after a free-look session.
  if (mode === "axis") camera.up.set(0, 1, 0);
  controls = makeControls(mode);
  controls.target.copy(target);
  // OrbitControls honors autoRotate; TrackballControls has no such option.
  if (mode === "axis") controls.autoRotate = autoRotate;
  controls.update();
}

setOrientationMode("axis");

// --- Orientation gizmo (Blender-style ViewHelper), labeled in CAD Z-up ---
// Models are authored Z-up but the glTF export lands them Y-up in the scene (a -90 deg
// rotation about X: part Z -> viewport +Y, part X -> +X, part Y -> -Z). The ViewHelper
// labels world axes X/Y/Z, so we feed it a proxy camera rotated by the inverse of that
// export transform; its labels then read as the part's authored X/Y/Z (Z up).
const gizmoDiv = document.getElementById("gizmo");
const gizmoRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
gizmoRenderer.setPixelRatio(window.devicePixelRatio);
gizmoRenderer.setSize(128, 128);
gizmoRenderer.setClearColor(0x000000, 0);
gizmoDiv.appendChild(gizmoRenderer.domElement);
const gizmoCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
// Inverse of the export tilt (+90 deg about X) maps viewport frame back to part frame.
const PART_FROM_VIEWPORT = new THREE.Quaternion().setFromAxisAngle(
  new THREE.Vector3(1, 0, 0), Math.PI / 2);
// ViewHelper's labels are the fixed X/Y/Z (red/green/blue); our proxy camera remaps
// the viewport frame to the part frame, so those labels read as the authored axes.
const viewHelper = new ViewHelper(gizmoCamera, gizmoRenderer.domElement);

function renderGizmo() {
  // Proxy camera shares the main camera's distance/orientation, re-expressed in the
  // part's authored frame, so the gizmo tumbles with the view and reads Z-up.
  gizmoCamera.position.copy(camera.position).sub(controls.target)
    .applyQuaternion(PART_FROM_VIEWPORT).setLength(3);
  gizmoCamera.quaternion.copy(PART_FROM_VIEWPORT).multiply(camera.quaternion);
  gizmoCamera.up.copy(camera.up).applyQuaternion(PART_FROM_VIEWPORT);
  viewHelper.render(gizmoRenderer);
}

// Face picking: raycast against the model's mesh parts. build123d exports one glTF
// primitive per face in face order, so a part's index into `pickParts` is its index
// into the element-map sidecar's `elements` array.
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
renderer.domElement.addEventListener("click", ev => {
  if (!modelRoot || !elementMap) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(pickParts, false);
  const out = document.getElementById("i-picked");
  if (!hits.length) { out.textContent = "-"; return; }
  const idx = pickParts.indexOf(hits[0].object);
  const el = (elementMap.elements || [])[idx];
  out.textContent = el ? `${el.id} (by ${el.created_by})` : "-";
});

// Ambient base, always on; the rig below provides the directional/spot character.
const ambient = new THREE.HemisphereLight(0xffffff, 0x2a3340, 0.45);
scene.add(ambient);

// A swappable light rig. Each preset clears and rebuilds `lightRig`.
const lightRig = new THREE.Group();
scene.add(lightRig);

function makeShadowCaster(light) {
  light.castShadow = true;
  light.shadow.mapSize.set(2048, 2048);
  light.shadow.bias = -0.0004;
  const c = light.shadow.camera;
  c.near = 0.5; c.far = 160; c.left = -40; c.right = 40; c.top = 40; c.bottom = -40;
  return light;
}

const LIGHT_PRESETS = {
  sun() {
    ambient.intensity = 0.45;
    const key = makeShadowCaster(new THREE.DirectionalLight(0xfff4e6, 2.2));
    key.position.set(12, 20, 8);
    const fill = new THREE.DirectionalLight(0x9fc7ff, 0.45); fill.position.set(-10, 6, -8);
    return [key, fill];
  },
  natural() {
    // Even, all-around illumination with no harsh single source. Directionals ring the
    // model from four sides AND from below, plus a bright hemisphere and strong ambient,
    // so the underside is lit too (a top-only rig leaves the bottom dark).
    ambient.intensity = 0.85;
    const hemi = new THREE.HemisphereLight(0xeaf4ff, 0xb8c2d0, 1.0);
    hemi.position.set(0, 20, 0);
    const top = makeShadowCaster(new THREE.DirectionalLight(0xffffff, 0.7));
    top.position.set(8, 20, 10);
    const left = new THREE.DirectionalLight(0xffffff, 0.4); left.position.set(-16, 6, 0);
    const right = new THREE.DirectionalLight(0xffffff, 0.4); right.position.set(16, 6, 0);
    const back = new THREE.DirectionalLight(0xffffff, 0.4); back.position.set(0, 6, -16);
    const under = new THREE.DirectionalLight(0xffffff, 0.35); under.position.set(0, -14, 4);
    return [hemi, top, left, right, back, under];
  },
  studio() {
    ambient.intensity = 0.5;
    const key = makeShadowCaster(new THREE.DirectionalLight(0xffffff, 1.5)); key.position.set(10, 14, 12);
    const fill = new THREE.DirectionalLight(0xcfe0ff, 0.9); fill.position.set(-12, 8, 6);
    const rim = new THREE.DirectionalLight(0xffffff, 1.1); rim.position.set(0, 10, -14);
    return [key, fill, rim];
  },
  spotlight() {
    ambient.intensity = 0.2;
    const spot = makeShadowCaster(new THREE.SpotLight(0xffffff, 900, 0, Math.PI / 6, 0.4, 1.4));
    spot.position.set(6, 26, 10);
    return [spot];
  },
  overcast() {
    ambient.intensity = 1.0;
    const soft = makeShadowCaster(new THREE.DirectionalLight(0xeaf0f6, 0.6));
    soft.position.set(4, 24, 6);
    return [soft];
  },
};

function setLighting(name) {
  lightRig.clear();
  const preset = LIGHT_PRESETS[name] || LIGHT_PRESETS.sun;
  preset().forEach(l => { lightRig.add(l); if (l.target) lightRig.add(l.target); });
  localStorage.setItem("ncad.light", name);
}

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.ShadowMaterial({ opacity: 0.32 })
);
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

let grid = new THREE.GridHelper(80, 80, cssColor("--grid-major"), cssColor("--grid-minor"));
scene.add(grid);

// Recolor the 3D scene from the current theme's CSS variables. Called on theme change.
function applySceneTheme() {
  const bg = cssColor("--scene-bg");
  scene.background = bg;
  if (scene.fog) scene.fog.color = bg;
  const major = cssColor("--grid-major"), minor = cssColor("--grid-minor");
  const gm = grid.material;
  (Array.isArray(gm) ? gm : [gm]).forEach((m, i) => { m.color = i === 0 ? major : minor; });
  const edgeColor = cssColor("--edge");
  edges.forEach(e => { e.material.color = edgeColor; });
}

// Material presets for "Material" mode.
const MATERIALS = [
  { name: "Concrete",  color: 0xb8bdc4, metalness: 0.05, roughness: 0.9 },
  { name: "Brick",     color: 0xa8533a, metalness: 0.0,  roughness: 0.85 },
  { name: "Red brick", color: 0x8c3b2b, metalness: 0.0,  roughness: 0.9 },
  { name: "Timber",    color: 0xb9824f, metalness: 0.05, roughness: 0.6 },
  { name: "Oak",       color: 0x9c6b3f, metalness: 0.05, roughness: 0.55 },
  { name: "Sandstone", color: 0xd8c9a3, metalness: 0.0,  roughness: 0.8 },
  { name: "Plaster",   color: 0xeae6dd, metalness: 0.0,  roughness: 0.95 },
  { name: "Stucco",    color: 0xc9b79a, metalness: 0.0,  roughness: 0.85 },
  { name: "Steel",     color: 0x9aa6b4, metalness: 0.85, roughness: 0.35 },
  { name: "Copper",    color: 0xb87333, metalness: 0.9,  roughness: 0.4 },
  { name: "Glass",     color: 0x8fb8d8, metalness: 0.1,  roughness: 0.05, opacity: 0.45 },
  { name: "Slate",     color: 0x4a525c, metalness: 0.1,  roughness: 0.7 },
  { name: "Marble",    color: 0xe8e8ea, metalness: 0.05, roughness: 0.3 },
  { name: "Terracotta",color: 0xc06a4b, metalness: 0.0,  roughness: 0.8 },
  { name: "Graphite",  color: 0x2f3640, metalness: 0.3,  roughness: 0.6 },
  { name: "Mint",      color: 0x8fd4bf, metalness: 0.05, roughness: 0.55 },
];
let materialIndex = parseInt(localStorage.getItem("ncad.material") || "0", 10) || 0;

// Smooth shading: use the per-vertex normals ncad exports in the glTF so curved surfaces
// (a swept tube, a fillet) read as round rather than faceted. flatShading would discard
// those normals and light each triangle flat. Geometry/mesh are unchanged, this is display
// only (the tessellation density is set at export time, kernel side).
const SOLID = new THREE.MeshStandardMaterial({ color: 0xc6d3e2, metalness: 0.05, roughness: 0.85, flatShading: false });
const WIRE = new THREE.MeshBasicMaterial({ color: 0x5aa0ff, wireframe: true });
const XRAY = new THREE.MeshStandardMaterial({ color: 0x5aa0ff, transparent: true, opacity: 0.26, depthWrite: false });
function materialMat() {
  const m = MATERIALS[materialIndex];
  return new THREE.MeshStandardMaterial({ color: m.color, metalness: m.metalness, roughness: m.roughness });
}

let modelRoot = null, edges = [], mode = "solid", showEdges = true, castShadows = true;
let pickParts = [], elementMap = null;
const loader = new GLTFLoader();

function clearModel() {
  if (modelRoot) { scene.remove(modelRoot); modelRoot = null; }
  edges.forEach(e => scene.remove(e)); edges = [];
  pickParts = []; elementMap = null;
  const picked = document.getElementById("i-picked");
  if (picked) picked.textContent = "-";
}

function applyMode() {
  if (!modelRoot) return;
  const mat = { solid: SOLID, material: materialMat(), wireframe: WIRE, xray: XRAY }[mode];
  modelRoot.traverse(o => { if (o.isMesh) { o.material = mat; o.castShadow = castShadows && mode !== "wireframe"; } });
  edges.forEach(e => { e.visible = showEdges && mode !== "wireframe"; });
}

function syncMaterialBlock() {
  // Material swatches stay hidden until the user picks "Material" display mode.
  document.getElementById("vc-material").hidden = mode !== "material";
}

function frameModel() {
  const box = new THREE.Box3().setFromObject(modelRoot);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  modelRoot.position.sub(center);
  edges.forEach(e => e.position.sub(center));
  // Drop the model onto the ground plane (y=0 at its base).
  const half = size.y / 2;
  modelRoot.position.y += half; edges.forEach(e => e.position.y += half);
  const radius = Math.max(size.x, size.y, size.z);
  camera.position.set(radius * 1.4, radius * 1.05, radius * 1.6);
  camera.near = radius / 100; camera.far = radius * 50; camera.updateProjectionMatrix();
  controls.target.set(0, half, 0); controls.update();
  document.getElementById("i-size").textContent =
    `${size.x.toFixed(1)} × ${size.z.toFixed(1)} × ${size.y.toFixed(1)} m`;
}

function loadModel(name) {
  spinner.style.display = "flex";
  loader.load(`/models/${name}`, gltf => {
    clearModel();
    modelRoot = gltf.scene;
    let tris = 0, meshes = 0;
    modelRoot.traverse(o => {
      if (o.isMesh) {
        meshes++;
        pickParts.push(o);
        const geo = o.geometry;
        tris += (geo.index ? geo.index.count : geo.attributes.position.count) / 3;
        const line = new THREE.LineSegments(
          new THREE.EdgesGeometry(geo, 25),
          new THREE.LineBasicMaterial({ color: cssColor("--edge") }));
        o.updateWorldMatrix(true, false); line.applyMatrix4(o.matrixWorld);
        edges.push(line); scene.add(line);
      }
    });
    scene.add(modelRoot);
    document.getElementById("i-tris").textContent = Math.round(tris).toLocaleString();
    document.getElementById("i-meshes").textContent = meshes;
    applyMode(); frameModel();
    spinner.style.display = "none";
  }, undefined, err => { spinner.textContent = "failed to load model"; console.error(err); });
  fetch(`/api/elementmap/${name}`)
    .then(r => r.ok ? r.json() : null)
    .then(j => { elementMap = j; })
    .catch(() => { elementMap = null; });
  loadBom(name);
  loadPlan(name);
  loadHierarchy(name);
  loadSketchStatus(name);
}

// ---- Sketch constraint-status badge ----
const STATUS_RANK = { well: 0, under: 1, over: 2, inconsistent: 2 };

function loadSketchStatus(name) {
  const box = document.getElementById("sketch-status");
  const list = document.getElementById("sketch-status-list");
  const badge = document.getElementById("sketch-status-badge");
  fetch(`/api/status/${name}`).then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      const sketches = (data && data.sketches) || [];
      if (!sketches.length) { box.hidden = true; return; }
      box.hidden = false;
      let worst = "well";
      list.innerHTML = "";
      sketches.forEach(s => {
        if ((STATUS_RANK[s.status] || 0) > (STATUS_RANK[worst] || 0)) worst = s.status;
        const row = document.createElement("div");
        row.className = "sketch-status-row";
        const dot = document.createElement("span");
        dot.className = "status-dot " + s.status;
        const sid = document.createElement("span");
        sid.className = "sid"; sid.textContent = s.feature_id;
        const dof = document.createElement("span");
        dof.className = "dof"; dof.textContent = `(dof ${s.dof})`;
        row.appendChild(dot); row.appendChild(sid); row.appendChild(dof);
        if (s.failing_ids && s.failing_ids.length) {
          const fail = document.createElement("span");
          fail.className = "fail"; fail.textContent = `[${s.failing_ids.join(", ")}]`;
          row.appendChild(fail);
        }
        list.appendChild(row);
      });
      badge.className = "status-dot " + worst;
    }).catch(() => { box.hidden = true; });
}

const TREE_ICONS = {
  part: '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3 20 7.5v9L12 21 4 16.5v-9L12 3Z"/><path d="M4 7.5 12 12l8-4.5M12 12v9"/></svg>',
  feature: '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2"/></svg>',
  element: '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="5" y="5" width="14" height="14" rx="1.5"/></svg>',

// Build one tree node (and its subtree). The twist toggles a node's children; leaves
// hide the twist. Names/ops carry a class so the label toggle can hide them.
function treeNode(node) {
  const wrap = document.createElement("div");
  wrap.className = "tree-node";
  const row = document.createElement("div");
  row.className = "tree-row";
  const kids = node.children || [];
  const twist = document.createElement("span");
  twist.className = "tree-twist" + (kids.length ? "" : " leaf");
  twist.textContent = "▼";
  const ico = document.createElement("span");
  ico.className = "tree-ico " + node.kind;
  ico.innerHTML = TREE_ICONS[node.kind] || TREE_ICONS.element;
  const label = node.name || node.id || "?";
  row.innerHTML = "";
  row.appendChild(twist);
  row.appendChild(ico);
  const nameEl = document.createElement("span");
  nameEl.className = "tree-name"; nameEl.textContent = label;
  row.appendChild(nameEl);
  if (node.op) {
    const opEl = document.createElement("span");
    opEl.className = "tree-op"; opEl.textContent = node.op;
    row.appendChild(opEl);
  }
  wrap.appendChild(row);
  if (kids.length) {
    const childWrap = document.createElement("div");
    childWrap.className = "tree-children";
    kids.forEach(c => childWrap.appendChild(treeNode(c)));
    wrap.appendChild(childWrap);
    twist.addEventListener("click", () => {
      const collapsed = wrap.classList.toggle("tree-collapsed");
      twist.textContent = collapsed ? "▶" : "▼";
    });
  }
  return wrap;
}

// Collapse/expand: the floating toggle flips state; the rail and header buttons are
// explicit open/close. State persists.
function setRightSidebar(open) {
  document.body.classList.toggle("right-collapsed", !open);
  document.getElementById("vc-sidebar-toggle").classList.toggle("active", open);
  document.getElementById("right-toggle").classList.toggle("collapsed", !open);
  localStorage.setItem("ncad.rs.open", open ? "1" : "0");
  // During the width transition the canvas is stretched by CSS to fill the stage. Track
  // the camera aspect to the displayed canvas size each frame so the image is never
  // stretched (this is cheap and does NOT recreate the drawing buffer, so no flicker),
  // then do a single crisp setSize once the slide has finished.
  const started = performance.now();
  (function follow() {
    const w = renderer.domElement.clientWidth, h = renderer.domElement.clientHeight;
    if (w && h) { camera.aspect = w / h; camera.updateProjectionMatrix(); }
    if (performance.now() - started < 320) requestAnimationFrame(follow);
    else fitRendererToStage();
  })();
}
function toggleRightSidebar() {
  setRightSidebar(document.body.classList.contains("right-collapsed"));
}
document.getElementById("vc-sidebar-toggle").addEventListener("click", toggleRightSidebar);
document.getElementById("right-toggle").addEventListener("click", toggleRightSidebar);

// Draggable separator for the right sidebar width (persisted), mirroring the left one.
const RIGHT_WIDTH_KEY = "ncad.rs.width";
const rightResizerEl = document.getElementById("right-resizer");
let rightWidth = 320;
// Width lives in the --rs-width CSS variable so the collapse animation (width -> 0) and
// the drag both drive the same property.
function applyRightWidth(px) {
  rightWidth = Math.max(220, Math.min(560, px));
  document.documentElement.style.setProperty("--rs-width", rightWidth + "px");
}
const savedRightWidth = localStorage.getItem(RIGHT_WIDTH_KEY);
if (savedRightWidth) applyRightWidth(parseFloat(savedRightWidth));
rightResizerEl.addEventListener("pointerdown", ev => {
  ev.preventDefault();
  document.body.classList.add("resizing-sidebar");
  rightResizerEl.classList.add("dragging");
  // Suppress the width transition while dragging so it tracks the pointer 1:1.
  document.getElementById("right-sidebar").style.transition = "none";
  const onMove = e => {
    // Sidebar is anchored to the right edge; width grows as the pointer moves left.
    // The canvas stretches via CSS live; the backing buffer is refit on release.
    applyRightWidth(window.innerWidth - e.clientX);
  };
  const onUp = () => {
    document.body.classList.remove("resizing-sidebar");
    rightResizerEl.classList.remove("dragging");
    document.getElementById("right-sidebar").style.transition = "";
    localStorage.setItem(RIGHT_WIDTH_KEY, rightWidth);
    fitRendererToStage();
    window.removeEventListener("pointermove", onMove);
    window.removeEventListener("pointerup", onUp);
  };
  window.addEventListener("pointermove", onMove);
  window.addEventListener("pointerup", onUp);
});
rightResizerEl.addEventListener("dblclick", () => {
  applyRightWidth(320);
  localStorage.removeItem(RIGHT_WIDTH_KEY);
  fitRendererToStage();
});

// ---- Panel placement: corner anchor picker + free drag with edge snapping ----
const CORNER_KEY = "ncad.vc.corner", POS_KEY = "ncad.vc.pos";
const cornerBtn = document.getElementById("vc-corner");
const cornerPop = document.getElementById("vc-corner-pop");
const MARGIN = 16;

// Anchor to a corner using pixel left/top (the same basis as drag/snap) so the move can
// animate smoothly. `animate` is true only for user clicks, not the initial restore.
function anchorCorner(corner, animate) {
  controlsEl.dataset.corner = corner;
  const [v, h] = corner.split("-");
  const stageRect = stage.getBoundingClientRect();
  const r = controlsEl.getBoundingClientRect();
  const x = h === "left" ? MARGIN : stageRect.width - r.width - MARGIN;
  const y = v === "top" ? MARGIN : stageRect.height - r.height - MARGIN;
  if (animate) {
    controlsEl.classList.add("vc-animate");
    setTimeout(() => controlsEl.classList.remove("vc-animate"), 320);
  }
  placeFree(x, y);
  localStorage.setItem(CORNER_KEY, corner);
  localStorage.removeItem(POS_KEY);
}

cornerBtn.addEventListener("click", ev => { ev.stopPropagation(); cornerPop.hidden = !cornerPop.hidden; });
cornerPop.querySelectorAll("button").forEach(b =>
  b.addEventListener("click", () => { anchorCorner(b.dataset.corner, true); cornerPop.hidden = true; }));
// Close the corner popup when clicking anywhere outside it or the button, or on Escape.
document.addEventListener("mousedown", ev => {
  if (!cornerPop.hidden && !cornerPop.contains(ev.target) && ev.target !== cornerBtn && !cornerBtn.contains(ev.target)) {
    cornerPop.hidden = true;
  }
});
document.addEventListener("keydown", ev => { if (ev.key === "Escape") cornerPop.hidden = true; });

// Free-drag from the grip; on release, snap to the nearest viewport edge. A top/bottom
// snap keeps the panel horizontal; a left/right snap flips it vertical.
function placeFree(x, y) {
  controlsEl.style.left = x + "px"; controlsEl.style.top = y + "px";
  controlsEl.style.right = ""; controlsEl.style.bottom = "";
}
function snapToEdge() {
  const stageRect = stage.getBoundingClientRect();
  const r = controlsEl.getBoundingClientRect();
  const cx = r.left - stageRect.left + r.width / 2, cy = r.top - stageRect.top + r.height / 2;
  const dl = cx, dr = stageRect.width - cx, dt = cy, db = stageRect.height - cy;
  const min = Math.min(dl, dr, dt, db);
  // Snap to the nearest edge but keep the panel's shape (no vertical reorientation).
  let x = r.left - stageRect.left, y = r.top - stageRect.top;
  if (min === dl) x = MARGIN;
  else if (min === dr) x = stageRect.width - r.width - MARGIN;
  else if (min === dt) y = MARGIN;
  else y = stageRect.height - r.height - MARGIN;
  x = Math.max(MARGIN, Math.min(stageRect.width - r.width - MARGIN, x));
  y = Math.max(MARGIN, Math.min(stageRect.height - r.height - MARGIN, y));
  placeFree(x, y);
  localStorage.setItem(POS_KEY, JSON.stringify({ x, y }));
  localStorage.removeItem(CORNER_KEY);
}

document.querySelector(".vc-grip").addEventListener("mousedown", ev => {
  ev.preventDefault();
  const stageRect = stage.getBoundingClientRect();
  const r = controlsEl.getBoundingClientRect();
  const offX = ev.clientX - r.left, offY = ev.clientY - r.top;
  const onMove = e => placeFree(e.clientX - stageRect.left - offX, e.clientY - stageRect.top - offY);
  const onUp = () => {
    snapToEdge();
    window.removeEventListener("mousemove", onMove);
    window.removeEventListener("mouseup", onUp);
  };
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
});

// Restore saved placement: a free/snapped position wins, else a corner, else default.
const savedPos = localStorage.getItem(POS_KEY);
if (savedPos) {
  try { const p = JSON.parse(savedPos); placeFree(p.x, p.y); }
  catch (e) { anchorCorner("top-left"); }
} else {
  anchorCorner(localStorage.getItem(CORNER_KEY) || "top-left");
}

// ---- Spec combobox + models list ----
let specTree = [], selectedSpec = null, activeModel = null;
const REGEN_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>';
const DELETE_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';

function toast(message, isError) {
  const el = document.getElementById("toast");
  el.textContent = message;
  el.classList.toggle("error", !!isError);
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3200);
}

function flattenSpecs(nodes, out) {
  for (const node of nodes) {
    if (node.type === "dir") flattenSpecs(node.children, out);
    else out.push({ name: node.name, path: node.path });
  }
  return out;
}

function renderSpecTree(filter) {
  const box = document.getElementById("spec-tree");
  const all = flattenSpecs(specTree, []);
  const q = (filter || "").toLowerCase();
  const matches = all.filter(s => s.path.toLowerCase().includes(q));
  box.innerHTML = "";
  let currentDir = null;
  for (const s of matches) {
    const dir = s.path.includes("/") ? s.path.slice(0, s.path.lastIndexOf("/")) : "";
    if (dir !== currentDir) {
      currentDir = dir;
      if (dir) { const d = document.createElement("div"); d.className = "dir"; d.textContent = dir; box.appendChild(d); }
    }
    const row = document.createElement("div");
    row.className = "spec" + (selectedSpec === s.path ? " active" : "");
    row.textContent = s.name;
    row.title = s.path;
    row.addEventListener("mousedown", () => {
      selectedSpec = s.path;
      document.getElementById("spec-search").value = s.path;
      syncSpecClear();
      box.hidden = true;
    });
    box.appendChild(row);
  }
  box.hidden = matches.length === 0;
}

function loadSpecs() {
  fetch("/api/specs").then(r => r.json()).then(data => { specTree = data.tree || []; });
}

function iconButton(tip, svg, extraClass) {
  const b = document.createElement("button");
  b.className = "icon-btn" + (extraClass ? " " + extraClass : "");
  b.title = tip; b.setAttribute("aria-label", tip); b.innerHTML = svg;
  return b;
}

function renderModelList(models) {
  const list = document.getElementById("model-list");
  list.innerHTML = "";
  if (!models.length) { list.innerHTML = '<div class="panel-empty">no models in out/</div>'; return; }
  for (const m of models) {
    const row = document.createElement("div");
    row.className = "model-row" + (activeModel === m.name ? " active" : "");
    const name = document.createElement("div");
    name.className = "name"; name.textContent = m.name; name.title = m.name;
    row.appendChild(name);
    const actions = document.createElement("div");
    actions.className = "row-actions";
    const regen = iconButton("Regenerate", REGEN_SVG, "act-regen");
    regen.addEventListener("click", ev => { ev.stopPropagation(); regenerate(m); });
    const del = iconButton("Delete", DELETE_SVG, "act-delete");
    del.addEventListener("click", ev => { ev.stopPropagation(); removeModel(m.name); });
    actions.appendChild(regen); actions.appendChild(del);
    row.appendChild(actions);
    row.addEventListener("click", () => selectModel(m.name));
    list.appendChild(row);
  }
}

function refreshModels() {
  return fetch("/api/models").then(r => r.json()).then(data => { renderModelList(data.models); return data.models; });
}

function selectModel(name) {
  activeModel = name;
  loadModel(name);
  refreshModels();
}

function build(spec) {
  if (!spec) { toast("select a spec first", true); return; }
  spinner.style.display = "block";
  fetch("/api/build", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ spec }) })
    .then(async r => { const d = await r.json(); if (!r.ok) throw new Error(d.error || "build failed"); return d; })
    .then(d => { renderModelList(d.models); const first = (d.built || [])[0]; if (first) selectModel(first); toast("built " + (d.built || []).join(", ")); })
    .catch(e => toast(e.message, true))
    .finally(() => { spinner.style.display = "none"; });
}

function regenerate(model) {
  if (!model.source) { toast("no source recorded for " + model.name, true); return; }
  build(model.source);
}

function removeModel(name) {
  if (!window.confirm("Delete " + name + "?")) return;
  fetch("/api/models/" + encodeURIComponent(name) + "/delete", { method: "POST" })
    .then(r => r.json())
    .then(d => { if (activeModel === name) { activeModel = null; clearModel(); } renderModelList(d.models); toast("deleted " + name); })
    .catch(() => toast("could not delete " + name, true));
}

const specSearchEl = document.getElementById("spec-search");
const specClearEl = document.getElementById("spec-clear");

function syncSpecClear() {
  specClearEl.hidden = specSearchEl.value === "";
}

specSearchEl.addEventListener("input", ev => { renderSpecTree(ev.target.value); syncSpecClear(); });
specSearchEl.addEventListener("focus", ev => renderSpecTree(ev.target.value));
specSearchEl.addEventListener("blur", () => setTimeout(() => { document.getElementById("spec-tree").hidden = true; }, 150));
specClearEl.addEventListener("mousedown", ev => {
  // mousedown (not click) so it fires before the input's blur hides the tree.
  ev.preventDefault();
  specSearchEl.value = "";
  selectedSpec = null;
  syncSpecClear();
  renderSpecTree("");
  specSearchEl.focus();
});
document.getElementById("spec-build").addEventListener("click", () => build(selectedSpec));

// ---- Color theme: one toggle cycling light -> system -> dark (persisted) ----
const THEME_ORDER = ["light", "system", "dark"];
const THEME_ICONS = {
  light: '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2M12 19.5v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2.5 12h2M19.5 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>',
  system: '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg>',
  dark: '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5Z"/></svg>',
};
const themeBtn = document.getElementById("theme-toggle");
const themeIcon = document.getElementById("theme-icon");
const darkMedia = window.matchMedia("(prefers-color-scheme: dark)");
let themeChoice = localStorage.getItem("ncad.theme") || "system";

function resolvedTheme() {
  return themeChoice === "system" ? (darkMedia.matches ? "dark" : "light") : themeChoice;
}
function applyTheme() {
  document.documentElement.setAttribute("data-theme", resolvedTheme());
  themeIcon.innerHTML = THEME_ICONS[themeChoice];
  themeBtn.title = "Theme: " + themeChoice[0].toUpperCase() + themeChoice.slice(1) + " (click to change)";
  applySceneTheme();
}
themeBtn.addEventListener("click", () => {
  themeChoice = THEME_ORDER[(THEME_ORDER.indexOf(themeChoice) + 1) % THEME_ORDER.length];
  localStorage.setItem("ncad.theme", themeChoice);
  applyTheme();
});
// When following the system and the OS theme flips, update live.
darkMedia.addEventListener("change", () => { if (themeChoice === "system") applyTheme(); });
applyTheme();

loadSpecs();
refreshModels().then(models => {
  if (!models || !models.length) return;
  const requested = decodeURIComponent(location.pathname.replace(/^\//, ""));
  const names = models.map(m => m.name);
  const initial = names.includes(requested) ? requested : names[0];
  selectModel(initial);
});

function fitRendererToStage() {
  camera.aspect = stage.clientWidth / stage.clientHeight; camera.updateProjectionMatrix();
  renderer.setSize(stage.clientWidth, stage.clientHeight);
  // TrackballControls caches the viewport rect and must be told when it changes.
  if (controls && controls.handleResize) controls.handleResize();
}

window.addEventListener("resize", fitRendererToStage);

// ---- Resizable sidebar (width persisted in localStorage) ----
const SIDEBAR_WIDTH_KEY = "ncad.sidebar.width";
const SIDEBAR_MIN = 220, SIDEBAR_MAX = 560;
const sidebarEl = document.getElementById("sidebar");
const resizerEl = document.getElementById("sidebar-resizer");

function applySidebarWidth(px) {
  // Never let the sidebar crowd out the stage: cap at the smaller of SIDEBAR_MAX and
  // (window width minus a minimum stage width), so the 3D viewport always stays visible.
  const maxByWindow = window.innerWidth - 360;
  const upper = Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, maxByWindow));
  const clamped = Math.max(SIDEBAR_MIN, Math.min(upper, px));
  sidebarEl.style.width = clamped + "px";
  return clamped;
}

const storedWidth = parseInt(localStorage.getItem(SIDEBAR_WIDTH_KEY), 10);
if (!Number.isNaN(storedWidth)) applySidebarWidth(storedWidth);

resizerEl.addEventListener("mousedown", ev => {
  ev.preventDefault();
  resizerEl.classList.add("dragging");
  document.body.classList.add("resizing-sidebar");
  const onMove = e => { applySidebarWidth(e.clientX - sidebarEl.getBoundingClientRect().left); fitRendererToStage(); };
  const onUp = () => {
    resizerEl.classList.remove("dragging");
    document.body.classList.remove("resizing-sidebar");
    localStorage.setItem(SIDEBAR_WIDTH_KEY, parseInt(sidebarEl.style.width, 10));
    window.removeEventListener("mousemove", onMove);
    window.removeEventListener("mouseup", onUp);
  };
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
});

// Double-click the separator to reset to the default width.
resizerEl.addEventListener("dblclick", () => {
  sidebarEl.style.width = "";
  localStorage.removeItem(SIDEBAR_WIDTH_KEY);
  fitRendererToStage();
});

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  renderGizmo();
})();
</script>
