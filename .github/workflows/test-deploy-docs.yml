name: Test docs build

# Build-only check on pull requests that touch the docs: proves the MkDocs site (with the
# code-generated op reference) builds cleanly under --strict before it can reach main. Does not
# deploy.

on:
  pull_request:
    paths:
      - "docs_site/**"
      - "docs/documentation-structure.json"
      - "mkdocs.yml"
      - "docs_hooks.py"
      - "src/ncad/docs/**"
      - "src/ncad/ops/op_registry.py"
      - "examples/**"
      - ".github/workflows/test-deploy-docs.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install docs dependencies
        run: uv sync --group docs
      - name: Build site (strict)
        run: uv run mkdocs build --strict
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
      - name: Docs accuracy gate
        run: uv run pytest tests/docs -q
