[project]
name = "ncad"
version = "0.0.1"
description = "Prompt to 3D models — architecture-first parametric modeling driven by a declarative spec."
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
    "build123d",
    "jsonschema",
    "leaf-common",
    "numpy",
    "trimesh",
    "pyrender",
]

[project.scripts]
# `ncad` = run the full spine (generate → validate → build → export).
ncad = "ncad.pipeline.__main__:main"
# `nv` = ncad viewer — launch the browser 3D viewer (alias for `python -m ncad.viewer`).
nv = "ncad.viewer.__main__:main"
# `ncad-examples` = compile every example brief into out/ for the viewer.
ncad-examples = "ncad.pipeline.build_examples:main"

[project.optional-dependencies]
# CAD interchange — DXF/IFC floor plans (plan.md Phase 7 / 11)
interchange = [
    "ezdxf",
    "ifcopenshell",
]
# Multi-agent orchestration (plan.md Phase 9)
agents = [
    "neuro-san",
]

[dependency-groups]
dev = [
    "pytest",
    "ruff",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ncad"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
# pycodestyle (E), pyflakes (F), isort (I), pyupgrade (UP), naming (N)
select = ["E", "F", "I", "UP", "N"]

[tool.ruff.lint.per-file-ignores]
# viewer_page.py is an embedded HTML/JS document; long markup lines are expected.
"src/ncad/viewer/viewer_page.py" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["ncad"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
markers = [
    "slow: tests that import the geometry kernel (OCP); slow first import (~90s). Run with -m slow or deselect with -m 'not slow'.",
]
